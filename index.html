<script>
const QUOTES = [{"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Volunteering", "Conference", "Awards"], "q": "My name is Adam Greenspan. I'm a partner at PWP Landscape Architecture and have led quite a number of our projects here. I've been the president of the Board of Landscape Architecture Foundation and served on the executive committee of ASLA as an LAF representative after I did that, and have been a member of ASLA for more years than I can remember now, so I have been part of decades of ASLA conferences. Led and been part of presentations and panel discussions there, but also have served on the ASLA jury both for the National Awards last year and then for the California Awards or the Northern California Chapters ASLA jury. A couple of times over the last years."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Awards"], "q": "I like to be involved on a volunteer basis with ASLA and especially related to design awards because I think the actual work that landscape architects do, and that get either built or published in the world are some of the ways that the work that we do can have some of the biggest impact on people and on places in the world and I think, reviewing those and looking at the best of what has been done or the best as of what has been submitted each year and hopefully that's the best of what has been done, and calling out and being able to pull out some of the remarkable projects."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Conference", "International"], "q": "T all of them of course, but some that have been produced by landscape architects is I think really exciting to be a part of, but also a way that. I hope some of the best work gets recognized and gets broader exposure in the world today."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Awards", "Advocacy"], "q": "To be recognized as some of the best work in the profession as part of those that are submitted for design awards, I think they need landscape architecture projects need to Be places that are."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Networking"], "q": "I think to be considered one of the best projects for design awards. They should serve both the community, the environment and culture in a way that is able to be understood and experienced by people. I think, and I think it's important when reviewing the awards that the key goals and ways that projects affect community, affect the environment and the specific. Take that the designers have on the way that landscape, these landscape architecture projects reach into and touch those aspects of the world need to be expressed."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Networking"], "q": "I also think it's important, that drawings and photographs of the project connect into the explanations and the concepts that are described so that jurors and then of course the general public can understand the depth, and the varied cut goals that landscape architecture addresses."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Awards", "International"], "q": "I think it's important to submit, and make the effort to submit projects for awards so that. We ASLA and the greater landscape architecture community is aware of what's going on across the country and around the world in landscape architecture and the It's every great project can't receive an award, but I think that every project that's submitted is reviewed closely and judged relative to the goals that have set out and the presentation that's put forth in the submission, and so I think making the effort to put forth a good presentation of a project gives the opportunity for recognition of the designers, but also I think the potential to get great ideas, great designs and great places. Recognized as part of part of The production of landscape architecture in the world."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Awards", "Career Development"], "q": "I absolutely feel that winning an ASLA award is a great accomplishment for designers and firms, their careers and their, and the work that they do, I think we review and engage firms and designers from all over the world in the Professional Design Awards jury, and the variety of ideas and the variety of places and constructions and that are being addressed across the world is really inspiring and being. A winner in the design categories I think is something that shows that the ideas and the Designs are Highest level in the field today."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Awards"], "q": "That sounds good, and I guess one question that I had just written to Carolyn and the design awards team was just that I'm not clear 100% on what the difference I'm so I'm going to ask you the differences between."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Awards", "Publications & Resources"], "q": "The research and analysis jury and that side and the design jury and where that's explained. Do you are you interviewing the other jury chair or do you have knowledge of this side of things?"}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Awards", "Volunteering", "Publications & Resources"], "q": "I've been during my involvement it went from one jury to being 2 juries and I remember discussion about that and I know that in certain ways there was a desire to get more research focused or metrics and analysis focused jurors."}, {"p": "Adam Greenspan", "m": "Member", "c": "Northern California", "t": ["Awards"], "q": "On the and also the number of awards kept growing, so it was hard for one jury to do all of it. But."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "I think I have been a member of ASLA for 23 years, is what it says on my record but. I remember being a member since I was a student, and so that was like 40 years ago, but I changed my name so I don't know. Precisely at least 23 years, if not 40."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "I have been a member for ASLA as long as I can remember at least 23 years, but I was a member since I was a student, so maybe it's even longer than that."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Networking", "International"], "q": "That. ASLA matters to me at this point in my life because it creates. A.Camaraderie and collaborative environment with other professionals in the same. Area of work that I am doing and with the same issues and problems being faced, so I like that. I like having others around the world, around the around the country. Like minded collaborators. Of the country. I don't know if that was good."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Networking"], "q": "The camaraderie and support has been very helpful in my career because we share experiences and so it gives me input and maybe how to handle a problem and it inspires me to do other things that other of my colleagues are doing elsewhere in the country so it. A source of inspiration, on the one hand, and it's a source of support for issues that we're facing. At this moment in time. I think another of the wonderful things that I appreciate now as a professional in ASLA is the advocacy portion."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Education"], "q": "I would encourage. A.Young landscape designer as a student to join ASLA because it's an incredible source of inspiration with the, and learning opportunities with the varied materials that are sourced out of the ASLA.I know the education. While the education programs are great, they are limited in the depth, and Breath of what the profession can do, which is I'm always amazed of how much resources ASLA has in that realm."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Conference", "Education"], "q": "My most recent my most utilized resource at this point in my life is a lot of the webinars that I go back to that I have not been able to see because of time the session recordings. Sometimes the ASLA sessions or so the ASLA conferences are, so rich in conferences and rarely can one clone ourselves to cover more so, that is an amazing resource. However, I have to say that earlier in my career. The contract portion, and the that was incredibly useful. I use the ASLA.Contract a lot. I use the sub consultant. I think sub consultant agreement a lot. I refer a lot to the ethical cases in times, so it's a guide to how to practice and I and I've learned that over the years, and to finding these resources."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["General"], "q": "I'm happy you mentioned The Weather Channel, that was that was actually quite interesting, so the way ASLA helped me in that one is we have the marketing, some marketing consultants that were helping ASLA with some marketing information, and so they actually coached me through this and because they are very knowledgeable, they were everything from what you will. How you will position yourself, your background, all of the things that you don't even think that are important, and then how your answers needed to be succinct. Less than 5 minutes and the noun was important and a little adjective, but how you responded to those. Things."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["General"], "q": "It was an incredible learning session and it was exactly as they said it would be, and so it was a very it was an easy interview in that sense, because I had been prepped for so much and so that was an incredible resource and helpful in that particular. ASLA has been wonderful in positioning us, or at least in myself in other avenues too, which I think we've done a lot of good help too. Good work."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Education"], "q": "It's I run a small business and I have for the past.Close to 3030 plus years and running a business is not something that is taught in school. We don't learn it. It's kind of you start doing it, and it feels easy just to have to provide services, things that we had learned in school, but once it gets to areas where we. Are not comfortable navigating or that we haven't taught to navigate."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["General"], "q": "In particular the contract section, that was incredibly useful for me, so I was able to find them. I'm AI like to explore websites so I was able to find it and it was simple language #1 which I understood what it meant and I felt that if it was there, it had been vetted for those who need to be vetted and it. Was, protecting me and protecting the client, so it was a it was an It was a trusted source. It came to me as a trusted source and it was easy to use and so that, to me facilitated the OK.I'm gonna just use this, also I now have my business has grown a lot. I'm now acting as prime consultant not only as sub consultant as I was before, so I'm able to use the sub consultant agreement. I'm able to use the contract agreements."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Advocacy", "Membership Value"], "q": "I'm able to put those things that are valued. By our profession, valued by me, and they're there already, and it's been uneasy. It's been an easy, source to use."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Networking"], "q": "Pm. I think ASLA has evolved through the years a tremendous amount. I've been in the profession for 40 years, and the last I would say, maybe the last 15, I feel that ASLA has truly. Met my needs because number one, I feel that we are doing things in a broader vase of projects that we do, that I feel that they are attainable. For a small firm, I used to believe that only the large firms could do these things, but I find in when I'm in these committees that the committees are formed by people and the people work in the large firms, but at the end of the day they. People, and so connecting with them has been very important to me and so it makes. It facilitates the work on the larger projects."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["General"], "q": "There's a There's a support system for everybody. Regardless of you're small or medium or in Topeka, KS or Miami, FL or New York, so I feel that the issues are more well covered and well balanced than I originally thought, so I think I think it supports everyone and I think that's a that's a good. I'm seeing that a lot and I like that and I think it's important for the young people to understand that there is this. Like minded support."}, {"p": "Aida Curtis", "m": "Member", "c": "Unknown", "t": ["Publications & Resources"], "q": "There's other resources, and now I've moved. We moved beyond the contract at this point in my life, but that was one of the first things that I found at ASLA so."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Education"], "q": "While I was in school, learned about ASLA probably two years into the program, yeah."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Membership Value", "Networking", "Advocacy"], "q": "ASLA membership matters to me because it's important for us to have a professional network behind our behind our field, behind our career. What's the what's the word I'm looking for?"}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Membership Value"], "q": "ASLA membership matters to me because it's important for us to collectively have a professional network behind our chosen career, our chosen field, which is landscape architecture. A lot of landscape architects. We're fighting to be at the table. We're fighting to be recognized as a profession, and so having this powerful organization behind us just further sort of solidifies our purpose in today's environment."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Advocacy", "Membership Value"], "q": "ISLA membership has been great, not just for networking. I know that there's also a lot of work done behind the scenes at the national and the state level to protect licensure. It's always up for debate here in Louisiana, and so it's really. Important that we have ASLA fighting for, fighting those battles for us, but also ASLA membership has been a great way to meet other professionals in Louisiana, outside of Louisiana, and just a good reason to get together sometimes."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Volunteering", "Membership Value"], "q": "I would say that the ASLA membership cost matches the value that I get out of it. I'm thankful that there is a monthly payment option and so it's just become sort of lumped into my usual monthly expenses. If I were to try to bite it off in one piece, it would probably feel more daunting and I would probably be hoping to get a little bit more out of my, but that also sort of varies with how active our local chapter is the Louisiana chapter, and so some executive committees are more go getters than others and so you feel that with your membership and the events that are pulled together and that sort of thing."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Publications & Resources", "Membership Value"], "q": "The collect I find myself using the collection of CEUS and just online videos, just a great resource for membership of the website I feel like is probably what I use the most."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Networking", "DEI & Inclusion", "Publications & Resources"], "q": "I use ASLA's CEU resources to maintain my requirements, annual requirements, but also to give access to people and expand perspectives that I otherwise. Might not have access to here in Louisiana, so it's been a great resource to get to hear from others across the country."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Conference", "Membership Value"], "q": "My volunteer work with ASLA, I've been part of The Excom since 20-16 when we first had the New Orleans conference here and I was involved up until 2023. I took a little break after having kiddos and, just trying to take a little less off my, a little more off my plate, but then with the with the conference returning to New Orleans, I just remembered how it was such a great time in 2016, and so I wanted to be part of that again, so I've been volunteering as the host booth co-chair, and that's been fun."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Conference"], "q": "It's great to not only hear kind of all the things that go into the conference leading up, it's been exciting to be part of sort of that graphic representation too as the host booth and part of the voice for the Louisiana. Chapter when we see so many folks that gather from across the country and it's also been, just a fun way to, yeah, keep up and keep the energy going with leading up to the conference."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["General"], "q": "At the host chapter booth, people can look forward to seeing some local Louisiana art. We're going to have a raffle, so we'll have we're collecting from donations from artists across the state, so that's going to be really fun. We're also going to be giving out some local flavors, so some pralines and some Tabasco sauces like we did last time, that was a that was a big hit last time, so we brought that back. We'll also have some stickers and some great guides to help you get around. To get around the city and make sure that you get the most out of your stay. We have a lot of folks that know the best places to eat and drink around the city, so visit us at the host booth so you can where to go."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Conference", "Volunteering"], "q": "Come visit us at the LCASLA host booth chapter host booth when you are walking into the conference hall for ASLA 2025."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Conference"], "q": "The conference returning to New Orleans in 2025 is so important not only because it's a great place for people to take a weekend and visit and experience what Southeast Louisiana has to offer and the greater sort. Of Gulf Coast, but also it's an important year 2025. It's been 25 years since Katrina last hit and so this is a great way for the city and Southeast Louisiana residents to show how far we've come since Katrina in some in some cases. How far we haven't come, there's a lot of work left to do for sure, and as landscape architects, we are a huge part of that conversation, a huge part of that conversation, so it'll be it'll it's a really great sort of time to reflect and to continue the important work that. We're doing."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Conference"], "q": "For someone, if I met someone that wasn't signed up for the conference, I would say get on down. We have to It's such a fun event, but also you it's an amazing time to Talk to people and hear different perspectives the from the field sessions to the presentations that are lined up for this year. It's a really great collection and I think the best opportunity to stay relevant in the field of landscape architecture, and so on top of getting to meet people, see people that you maybe haven't seen in a while, it's really that it's the best opportunity for that collective sharing of information and growth in the in the profession."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Conference"], "q": "I want to find a way to plug our field session, and so maybe I should have included that in the."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["General"], "q": "Ay, let's get it. The longer ones when you'd write it down. No, that wasn't it. Sorry."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Conference"], "q": "Danielle. Yeah. OK. I'm. Can't because I like took my computer apart to come into our conference room. My I'm without my screens and so like things are going other places, so I can't find the what's it called the number."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["General"], "q": "That's right, and how do I expand my thing again? Gosh. Make yourself bigger. There we go. OK, I'm back. OK."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Conference"], "q": "The conference being in New Orleans this year is a great opportunity to showcase a lot of the work that's been done since Hurricane Katrina made landfall in 20 in the year 2005.And so there's incredible work that's been done in and around the city. One project in particular is Gretna City Park that our firm Carver Landscape Architecture worked on with Wagner and Ball and we will be, completing a field session, we're going to be taking a trip to Gretna City Hall and then also to Gretna City Park to walk through the region's largest stormwater detention park."}, {"p": "Amy Norval", "m": "Student Member", "c": "Unknown", "t": ["Conference"], "q": "We're going to be talking through the We'll have people from folks from the city that kind of can speak to how we got the funding for the project, how we got here, why the project was selected and how important it is as this sort of kickstart project for the resiliency district in Gretna, which is a smaller sort of suburb to New Orleans, but they are really knocking it out of the park in terms of being climate ready and being ready for future proofing for the city, so the field session is titled Regional Planning, Local Adaptation, Climate Action. In the city of , For a national conference, it's great to have a big pool of experts, allied professions, not just left architects talking about their work, but also knowing how things operate in the bigger scale. It's always great.to just having to talk to people face-to-face, learning about their experience in person, so I think the conference is always a great time for everyone to get together and learn about each other's experiences."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["General"], "q": "Mm-hmm. I think they are very. I'll do it again. I think they're very valuable lessons learned in every project or every design exercise that we do, and I think it matters that we're still in this in a state of trying to grow our profession, so sharing all these valuable knowledge with our peers hasAlways been a critical part of our profession and I think the goal here is really try to expand our influence as a profession, but also knowing how to share the experience on leading bigger projects and working with multidisciplinary teams in order to.help our environment and improve our business environments."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["General"], "q": "I think the importance, well, I'll start from this, so I personally hosted a symposium locally in Northern California, which stressed on having multidisciplinary leaders as presenters, and Landscape Architects as moderators, that was an interesting exercise because it is important to highlight that Landscape Architects always situates ourselves in leading a much larger team. We really. In most cases, couldn't finish or do everything by ourselves, but knowing how to lead or being able to operate in a collaborative environment with other allied professions is always crucial."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["Sustainability & Climate"], "q": "Through sharing these experiences, there are much smaller practices out there and. These lesson architects really need our help to share our lessons and knowing how they could be able to participate in larger, important projects in order to expand our influence in this built environment."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["Conference", "Education", "Networking"], "q": "These are important themes to highlight, especially in our current social contacts and political contacts and climate contacts, and I think it would be a great lesson learned for all participants in this year's conference."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["General"], "q": "I myself was first time some other couple years ago and I would always start small and stay focused because there are always lessons that we learn throughout any design process that we have, but the one that. The proposals that really stood out to me is the one that comes with a clear point of view and a very clear and sound message, so I think starting small, staying focused would always help."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["Networking"], "q": "For returning presenters, I think again highlighting more echoing this year's theme action, highlighting the work in progress and the behind the scenes would really help. I think great visuals sharing that lessons that's, hidden behind the scene. It's always something that lasting architects are curious to know about. The process to get to the design outcome really matters so as the way to collaborate with other people, so uncovering the more behind the scene would be. More exciting."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["Conference", "Membership Value"], "q": "That's pretty much it. I think there's one question about the why is it valuable to be in person, right? Yeah, I'll just wrap that up there. I think the meaning of the conference itself is."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["General"], "q": "Every year the conference brings professions to a city that they might have not lived in or worked in or even be in, and I think this yearly occasion is really a great time for people to come together in person because we're landscape architects. We love being outdoors. We like to interact with people. It's really the interactions, the feels and the touches to nature that brings us together and keeps our passion in this field, so I do encourage everyone to submit and. Join our annual conference."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["Networking"], "q": "I think, I think that's a great question, so I'm thinking about the people who are not joining and to be frank, mostly it's financially, but I think."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["Volunteering", "Membership Value"], "q": "I'll put it that way. You couldn't really imagine what you're get, what you're going to get out of it before trying to be a part of it, so I think my whole experience really started by myself joining as a student, really opening my door to national conference and.Attending a Contractors attending a sponsor's booth being there for the first time or hearing non landscape architects talking professionally on landscape projects, so these are all new experiences that I didn't know that I would gain. Before I joined the membership, locally, I became an executive committee member for the Northern California chapter back during COVID."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["Networking", "Volunteering"], "q": "That was my only way to sort of Professionally meeting people outside of my office and I think that was truly life-changing as I am now the trustees for my chapter after five years. It really. Strengthened my passion to stay in this industry as well as, try to, helping to build the community in my local area, so I think these would be my main takeaways for people who weren't in the SLA family."}, {"p": "Anson Wong", "m": "Student Member", "c": "Northern California", "t": ["Networking", "Membership Value"], "q": "I would say so, yeah, well, there's the factual part of how much people can afford, but also I think the value is definitely greater than the monetary value that you're putting in."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["Membership Value"], "q": "I joined after almost a decade of watching others benefit from being a member and decided it was time."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["General"], "q": "It matters for a lot of reasons. I feel like it's a place where I can have a collective voice where I can learn in my technical field. I feel it is a place for me to listen to diverse perspectives and grow as a professional. I could go on and on should I go? I've like I've got a big long spiel I can say. I just don't know how quick or short you want my answers to be."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["General"], "q": "All right, all right. Well, let me let me give you some more spiel then. Can I start at the beginning of my spiel?"}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["General"], "q": "Aflay matters to me because it's a place where I have a common collective voice. It's a place where I can learn in my technical field and listen to diverse perspectives. I get to grow as a professional and serve landscape architecture by giving back philanthropically I can also. Volunteer and provide awareness of causes and policies and lead by example by using the platform to elevate the next generation."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["Education", "Membership Value", "Networking"], "q": "The reason I would ask students to become members is because and this is an I sorry, let me say that again. The reason I feel that membership is important to  or mothers who are leaving the field and returning to the field, you often get put in design build professions as a way of working part time, so it's really important to realize that there are resources out there for you as a design build profess. There's a lot of technical expertise that ASLA provides to the design build professionals that they are completely not aware of because they don't ever take the opportunity to just check it out and learn. There are also this opportunities to really network and find out what policies impact the work we do as design build professionals."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["General"], "q": "Often with design build work, we have to rely on money for projects that are out there for us to bid on and to install and put into. The ground, that money comes from policies and grants that are supported by the advocacy of ASLA.Saw that directly impact me on several projects and without that knowledge and support I would just assume that money was coming from others."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["Volunteering"], "q": "I think the at the heart of ASLA is this heart of service and to be a professional who does well in the profession, you really have to serve and give back to the profession, and being a volunteer has allowed me the opportunity to see and really. Focus on the fact that it is an audit just about me that it's about that elevation and giving back to others, and the more that I create a knowledge about the profession session, the stronger the profession grows. We don't grow by ourselves."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["Networking", "Volunteering"], "q": "We grow by connecting with our Allied professionals. We grow by having a common voice that allows people to know what landscape architecture is We cannot do that alone and I think having that volunteer time to give back, to go into the Community, to tell people what landscape architecture is To elevate the knowledge of the profession, not just to each other, but to architects and engineers and our customer base and the public, I think really gives us the opportunity to be better at what we're doing, so volunteering, I think is at the heart of what landscape, architecture and ASLA really is."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["Education"], "q": "I feel like the ASLA fund is really a great opportunity for me to put my money where my mouth is, especially as an educator, I see the opportunities that our money does as service in dollars, and it provides that pipeline of students that we hope are become. Aware of what landscape architecture is well before their upper levels of high school, I believe that we are able to let students know what the profession is."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["Sustainability & Climate"], "q": "They see themselves in it. They see that they can. Fight climate change in the climate crisis through landscape architecture, they're becoming aware of how they can have a voice in environmental justice through landscape architecture. The young people of today want to save the world, and they're coming into the profession with that mindset, and what ASLA does is really kind of point them to the upper levels of education so that they can. Find their voice through education and landscape architecture as a profession."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["General"], "q": "There's a lot we can say that's not positive, but let's see positive wise. Let's see."}, {"p": "April Westcott", "m": "Member", "c": "Unknown", "t": ["Education", "Membership Value", "Networking"], "q": "Membership with ASLA comes with more membership benefits than I can even use. I have all the access of all of the online tools which we access. I personally access regularly. I look up projects that are award-winning projects that I can use as examples in the classroom. I do th ies, but it's also given me the exposure to landscape architects across the country and their work, and because sometimes some of us are very insular in where we're practicing or more localized, and this got me out, and saw what everyone else is doing, even if I'm not doing it. It gave me the impetus to go for and to keep looking for that in my work."}, {"p": "Emily O'Mahoney", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "We have probably have my one, my favorite one on file one from 5-6 seven years ago."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["General"], "q": "Or, like, they don't realize that. Like what? The end product is and it's not OK, but yes will do."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Education", "Membership Value"], "q": "Name is Estello Reganet and I graduated from MLA at Harvard Graduate School of Design in 2019 and I've been an ASLA member for a little over four years now."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Networking", "Career Development", "Membership Value"], "q": "I joined the ASLA little over a year after graduating from my master's program in 2020. Amidst the COVID-19 pandemic. At that point, I had just gotten a new job, and like a lot of people was feeling isolated amidst quarantining, and I'm so grateful to my new employer for covering the cost of membership. At the time, it allowed me to join a network of people, especially when I was feeling sort of isolated and by myself, so it gave me access to a community, when I felt like I didn't have one."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Sustainability & Climate", "Networking", "Advocacy"], "q": "ASLA membership matters to me because it connects me to a broader community of professionals of all ages and forms of practice who are passionate about more equitable, sustainable and resilient environments. It's also a reminder that the challenges we face, whether it be climate change, environmental justice, accessibility, or even compensation for our labor are shared and that we can tackle them more effectively when we learn from each other and advocate together."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Education", "Membership Value"], "q": "I could go back to join as a student ASLA member. I wouldn't. No kidding. OK.You can't have. You can't include that. Ah, I gotcha."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Education", "Networking"], "q": "We're back on If so, I actually wasn't a member of our student ASLA chapter, but if I could, I definitely would and would say that it's never too early to feel a part of something bigger. The ASLA offers students a really powerful introduction to the profession outside of the classroom, and a lot of that learning does happen beyond the classroom. It opens doors to mentors project opportunities, and a network that's really involved in exciting things, and so you're not just preparing for a career, you're joining a professional organization that really wants to support you in all of the ways that you want to practice."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Networking", "Membership Value"], "q": "It isn't most or it isn't a singular benefit per SE, but I think that my most utilized member benefit was being involved as an active member of my local chapter, the Boston Society of Landscape Architecture, I joined as an emerging professional and quickly got involved as an emerg. Professional Co chair and making connections with my peers, meeting new mentors has been really rewarding. It's also been great to understand the transition from a sort of emerging professional to what happens after there's a sort of Hmm, not unclear but amorphous way to practice or as you go from an emerging professional to sort of a mid career professional. There are a lot of challenges that people don't talk about at this stage in the career."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Membership Value", "Advocacy", "Volunteering"], "q": "ASLA membership has really given me a platform to advocate for the values that matter most to me, some of which are belonging and community engagement, so from serving on local chapter committees, contributing to national initiatives, I feel like I've also grown as a leader, and it's helped me clarify these values as a landscape architect and continue to feel grounded in the work as I help shape the future of the profession."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Networking"], "q": "Volunteering with the ASLA has really shown me that landscape architecture is as much about people as it is about place. Through the ASLA I've worked alongside peers who are as committed to mentorship and advocacy as they are to design, and it's really deepened my appreciation for the collective power we have to elevate our communities and to really elevate ourselves."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Career Development", "Membership Value"], "q": "Yep \u2014 see if I or let's start this way. Yeah, if my firm and my current employer hadn't paid for the AIDS or my membership to the ASLA, I don't think that I would be a member. Sometimes I or I feel like wait, is that is that bad to say?"}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Networking", "Volunteering", "Membership Value"], "q": "If my employers hadn't paid and financially supported my membership to the ASLA, I don't think I would be a member, speaking honestly it was a bit of a hurdle financially and a financial burden, but it has paid off in strides, I think, especially in the way that I'm able to give back to my community in the way that I have grown my own network and it's really. Important, speaking as the current Associate Advisory Committee Co chair, that all employers try and support their emerging professionals as they grow in this field and as they continue to learn and broaden the scope of their own networks."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Career Development"], "q": "Part of just to give some background, I worked at a firm previously and then now work for the city."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Career Development", "Advocacy", "Membership Value"], "q": "It's I've climbed the career ladder. No, but. Sure, and so I and start now and membership has really allowed me to Grow as a professional and learn as well as network and has given me access to leadership opportunities and supported my growth in the profession as well. From the work leading up to licensure to the work happening beyond."}, {"p": "Estello Raganit", "m": "Student Member", "c": "Massachusetts", "t": ["Career Development", "Membership Value"], "q": "That's why I believe that every firm, if they can, should support their emerging professionals and really the rest of their employees, to be members of the ASLA.It's really an invaluable opportunity and benefit and really supports or is a good faith effort in supporting growth and, or good faith effort in supporting employee growth."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Membership Value"], "q": "I've been a member of SLA since the mid 80s, so I think it's looking like around 40 years."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Education", "International"], "q": "I joined a year or two after Graduate School, when I finally got a footing back in the working world."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Networking", "Conference", "Education"], "q": "There were a lot of reasons that ASLA is meaningful to me professionally, and I might say personally as well. I have not missed an annual meeting now called conference since the late 80s, and I have watched them steadily improve. They weren't so good back then. I'm not sure I should say that, but as an educator I have found. The quality. To be superb, so I attend the meetings because I.As the chair of a department, a large department, I host a gathering of 200 people are usually 200 or more, and that network is just honestly very important to me in my role as chair, but it always has been. As in my practice and in my role as a teacher at a prominent school, my school, Harvard Graduate School of Design has. A vast number of sorry, I'm going to say that one again. My school, Harvard Graduate School of Design, has a vast number of alumni and the annual meeting or the conference is the place where I see the most of them, and that's a super important thing for me. They're my competitors sometimes, but they're my friends and sharing on the level of friendship and competitiveness is something that really is very enjoyable to me. I like it a lot. I went through a period of 20 years or so when I was presenting one or two or three or even 4.Papers or some kind of appearance? I'm a member of the round table and sometimes would appear on a on a, on a, on a session that was devised by the round table."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Membership Value", "Conference"], "q": "I often leave those, and so I just think there is so much to benefit. Members when they attend these conferences and as I mentioned, they get better and better, and it's really true. They're better every year."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Conference"], "q": "Anybody who has? A.Anybody who attends the conference is learning, and learning is a constant thing in life and in your professional life. It's especially important things change, the tools that we use change all the time, and so I don't tend to go to the technical sessions because I don't tend to do the technical work in the office. I tend to be the lead on project. And, so it's the engagement with new learnings and old friends that. Let's say infuses my professional life with energy and knowledge."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Career Development"], "q": "My partner Doug Reed and I had what I like to call a long courtship because we began working together as separate proprietors and we teamed up as two firms. In a competition that we won and once we began working on that the path was clear for us to join as a firm and we recast that in the year 1999.So we're in our 25th year now and we both have always felt that peer recognition was an enormous part of what gave us satisfaction in the work."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Awards", "Career Development"], "q": "ASLA provides the forum for peer recognition, so we have won a lot of awards and I don't say that lightly. It's very competitive and but we have been recognized by ASLA.Throughout the career of our firm and that is so incredibly valuable, I can't even state how valuable it is to have the peer recognition that is facilitated by ASLA."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Conference"], "q": "I think you'll be pleased to know that I care so much about students getting to ASLA that I have sponsored during my years as chair between 8:00 and 10:00 students to go to the annual meeting or the conference rather, and they get so much out of it \u2014 they come back on a high. It is super valuable for them, we have a large student chapter, and so I ask for proposals A1 page proposal explaining why it would be meaningful. For them to go to the conference, and if I get a number that I can afford, then I award them all six or $800.00 and I see them at the sessions and they come to our alumni gathering and to a person they really have a lot of joy and kind of wonder. About meeting professionals and attending sessions and, enjoying it?"}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["General"], "q": "I have AI have a very small discretionary budget. I have to be pretty careful with it, but that's one of my priorities."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "Thanks, Daniel. Well, I've. I've. I've said what I think I need to say about encouraging students in terms of our faculty, we have a lot of practitioners teaching here some part time, some full time. This is a place where, after 10 years of practice in a frontline firm. A large handful of people have. Decided to turn to academics and research and teaching, and so I don't know whether they retain their memberships. I should, and I would easily be prepared to encourage them to do so with respect to our young staff."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Awards", "Networking", "Conference"], "q": "We do have young staff review our awards preparations we submit every year that we can and that's one way they begin to get a sense of Our thirst for peer recognition, and then we do sponsor several young people in the firm to go to the conference. It's been getting very costly for us to do so."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Membership Value", "Awards", "Career Development"], "q": "Because we have had 10, sometimes 13 people from the firm attend. If you are we do a firmwide call for papers to be presented and to make proposals. I'm gonna start that one over again. In the firm we do a call firm wide to ask for people who want to prepare proposals and. Coach them in order to get something that's worthwhile and we encourage them to partner with people in other firms, and so then we're sort of doing an in house? Examination of the topics that we want to put forward and we do try to include some younger staff in that they also participate in our awards. Projects either helping us to put the awards submissions together or. We have a little group that critiques those, and we sometimes will include young people there and we do support the cost of membership."}, {"p": "Gary Hilderbrand", "m": "Member", "c": "Unknown", "t": ["Sustainability & Climate"], "q": "I think the best and brightest minds in our discipline need to work together and ASLA is one of the vehicles where we can make a difference in our work and then culture and in society we have serious environmental crises ahead of us. Climate crisis and a justice crisis. We do the work and we need to work together. An ASLA can help you do that."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "He's probably gonna go to Oklahoma State, but we're looking at a few other ones."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Membership Value"], "q": "I've been a member of ASLA for about 20-3 years. I've missed a few years in there, but for 23 years off and on."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education", "Advocacy", "Volunteering"], "q": "Out of college or in college? Actually, I was part of the student chapter in college and professional. As soon as I graduated."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Career Development", "Membership Value"], "q": "I think that the ASLA membership matters to me because it's one broadened my outlook on my career and how I look at landscape architecture. It's helped me define what landscape architecture is, and it's been a great networking tool. It has been a great tool to expand our business. It's been a great resource in education. It's been a great resource in, not only my business development, but my personal development in the industry, it's helped me see things a little bit different from what we maybe see just here in Oklahoma, so it's giving us the broader scope of landscape architecture across the country."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education"], "q": "Awesome. I would encourage students to get involved with ASLA just because it allows them to have more interaction with professionals because I know locally in our state it's a priority of ours to include the students in our state meetings monthly and to engage them in different activ, and get them involved in the profession, so it really it's a resource for students to again learn about the profession, not only from a student level but from a professional level because they are engaging the professionals. On a more regular basis with that and it provides them a lot of resources too in their development as a professional."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Publications & Resources"], "q": "Seeing that my student involvement was so long ago being 24 years ago, I think student involvement was probably the connection with the professionals and really that was a major resource back then because we were really 24 years ago, just getting started with Emails and stuff, so the digital age of how we connect with people was not there, so it was something to be involved with events and attend things that professionals were at and other students."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Education", "Publications & Resources"], "q": "Probably current most utilized benefit is again continuing education and the resources that the website provides for professionals to see what other professionals are doing around the country and as an organization I think that. More than anything, it is a, an extreme networking tool to be able to talk about business, talk about landscape, architecture, relationships, and everything else. I wouldn't have some of the friends and business acquaintances that I do without ASLA. Thank you."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Career Development"], "q": "I am a principal and partner in planning, design Group or PDG in Tulsa, OK, and we also have a sister company, Heck, and Kemper Golf."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Career Development", "Membership Value"], "q": "Membership has helped me just again in my business development skills in my leadership skills, and got me to where I am, without some of those resources and connections and discussions on how businesses operate and expectations, I think that I would have been lagging behind a little bit and with our company, we do encourage involvement in ASLA locally, and on the national level, we have out of our office, I believe probably 70% are members of ASLA.We have tried to encourage some other ones that just don't want to get involved and so we kind of have the rule that if you don't want to get involved, then we don't really need to pay for your membership, but we pay for anybody's membership who. Does want to be involved in active in ASLA."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Career Development", "Membership Value"], "q": "We do. We do support any of our employees that want to be a member or want to become licensed will pay for their licensing exams as long as they pass the test, so we want them to grow."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "I think I think a long time ago that I got in trouble when I was first hired here 18 years ago, when I said I wanted mine paid for I was kind of the first person that was probably higher involved than most, and they're like, well, as long as you're going to stay active and stay involved, and now they're like, oh, wait a minute. Maybe you're a little too involved. So."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Volunteering"], "q": "W I'm involved with ASLA in many different roles on state and national level. I again I am the board of trustee for the state of Oklahoma. I have been. I have a couple years left on that tenure of trustee. I will remain involved with our state chapter, but in past roles I've been chapter President. Member at large, associate at large, I have set on our scholarship chair. I now chair or our scholarship committee. I now chair. Our scholarship committee. A sponsorship. I've done that for probably 8 to 10 years. I also sat on professional advisory committee for Oklahoma State University for a degree program, and then I also was appointed by the Mayor of Tulsa to be on the Tulsa Preservation Commission, so I set on that role, and have for the last three years."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Conference"], "q": "100% agree that the conference supports all of that because. The conference is where you get to see people face to face. It's something that we've missed a little bit and this may not be something that you want to record because I know the administration there in DC hates when we say this, but we all miss the in person advocacy day and the meetings in DC and every, because it was another opportunity to just bounce ideas and everything else. Off of each other and it's a lot harder in the virtual meetings because we're stuck in little corners and we're listening to a presentation and there's not that. Personal interaction during the breaks and all that type of stuff."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education", "Networking", "Volunteering"], "q": "Being a part of the national conference, there's obviously you can select from a number of continuing education classes. You can select from, outings around the town that it's inner city, that it's in that provide those opportunities and then just being together with the other landscape architects. From around the country, friends that you've created over the years and then being involved with the national level as trustee or president for the state has allowed me to even interact more with people, during those events. Yeah."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Volunteering"], "q": "Originally, when we would have two meetings every year, so CPC and the Board of trustees would have a what we called a mid year meeting in April MAYESH and that was Advocacy Day also."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Advocacy"], "q": "We would fly in the DC on a Thursday. I think it was We would do advocacy day on Friday where we would go meet with senators and representatives from our state and promote the profession and promote."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "Various topics and bills that were on the table and then we would then do our mid year meetings on Saturday and Sunday and then fly out Sunday night, that ended with COVID and then has never come back around I believe, just being involved as a trustee and stuff that money's been kind of re appropriated to things that support our overall mission of the of the organization and so. We understand that, but it's just, it's a missed thing. It was a good a good deal to be able to be in front of each other, not have to worry about the conference coming up the days after the meetings, where now when we do our meetings with the conference, we have those for the day and 1/2 or so or kinda you almost put it for two days for travel and everything else before the conference and then you start the conference."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "I think that the National Office does a great job. The executive team does a great job of leading our organization in the right direction. We have some great leaders in place now that. Have drive an initiative to move us forward in the right direction, and so I appreciate all of y'all's work in DC and no, it's been great."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "I wish I'm. I'm getting ready to get in the car and put on a Sport coat and button up shirt and well, I won't do it now, but in a couple hours I'll drive 2 hours or hour 45 minutes to Oklahoma City for a project Inter."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "I will. I do not have your contact info unless it's in just that e-mail invite and I think it just had Daniel's. I could be wrong, so if you don't mind sending that to me, that would be great."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "Awesome. If I don't respond, I'm getting ready to leave town here in about 15 minutes. I'll get it to you this weekend or next week."}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Conference"], "q": "All right. All right. Well then looking forward, are you going to be in New Orleans with us this year?"}, {"p": "Geoffery Evans", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Conference"], "q": "All right. Well, we'll see. You all right? We'll see you in New Orleans then \u2014 thanks you too."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["Volunteering", "Membership Value"], "q": "I'm Gretchen Wilson. I am a president-elect of ASLA and I've been a member for over 15 years."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["Conference", "Education", "Networking"], "q": "I am on the Conference Education Advisory Committee. Is that what it's called? Well, OK, I'm on the Conference Advisory Committee and I help with a large committee of people to review the session submission guidelines as well."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["Conference", "Networking", "Awards"], "q": "As the descriptions of the sessions and then I also get to review submissions of sessions that people send in."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["Education", "Networking"], "q": "Thank you. It's important to me because I love my profession and I really feel that ASLA is the best outlet for and also just community for us all to come together and really. Share ideas, share our knowledge and advance the profession and that's really good for all of us, and so I'm really just, I've been a member for so long because I love being re-inspired by ASLA, especially at the conference, but, even just throughout the years being able to do continuing education and being able to network locally at the chapter level, so it's a lot of fun and as well as just enriching to my career and then. I feel like I'm able to bring that back to my office and then share that with others as well."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["Conference"], "q": "I think one of them was how do you make the session more engaging or something like that?"}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "I definitely think that the deep dive approach has worked really well for me in the past in terms of getting my submissions and my group submissions selected. I think that. People coming to the conference really want to learn as much as they can on specialized topics, and if they're just getting a broad overview, they don't really, they don't walk away feeling like they. Gotten to know you or really gotten to understand like what's different about your work and the process that you use or the design methods that you have employed on that project rather than trying to go over. Every project you've ever done really dive deep into what made that project unique or what are the specific areas of our practice that people really want to learn about."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "Like this year we did. Play, and it was a really good one because we had three people from different firms talk about really what inspires them to create play that is challenging the norm of playground design, so that was really engaging and fun, and I feel like people walked away with detailed information about all the technicalities of play and play design, but also just kind of why we want to push.play design forward."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "I felt like the Preparation that we put into that like thinking of ahead about what are the questions that we're going to ask in a quiz and honestly like that kind of fed back into what we were presenting and so. We tried to keep as tight to our original outline as possible, but we kind of continued to develop and evolve that to be more engaging and also just more informative and in-depth."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "I think once or twice in the past I've spoken with someone from an allied organization, and I've also been to presentations where there's a client or a collaborator on the project, like an ecologist or an engineer, and I really love hearing the perspectives from all the different sides of what makes a project happen from the initial funding to the ongoing maintenance to the real technicalities of getting something approved, and I feel like all the audiences have always appreciated being able to hear those different perspectives, over the years, I've kind of noticed that those are the ones that are more engaging, just really fun to hear all the aspects of the putting together of a project."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "I think one year, I think it was my first year presenting at ASLA and I was just so eager to present everything about a project that I think I presented too much information and it was kind of I felt like I needed to focus on one aspect of the project rather than every aspect of the project. I could really tell that the audience was really engaged when the my client talked about her background on the project and, her involvement throughout the planning process."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "When I got into talking about the project, it felt like people kind of their attention might have gotten lost a little bit because it was like a lot of detail about the project. I do wish I had kind of narrowed it down, narrowed down the scope of that presentation to something that was really more meaty or meaningful that people could take away."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "I think about how because we do so many things in our in our work that is all about making things happen, and also there's also like storytelling too, like."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "Kind of tying in the fun side of being in LA and the movie-making city that it is and really talking about narrative in our design as well, but I think there's just a lot we can do with that."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["Networking"], "q": "I think also we have such a great opportunity in Los Angeles for it's California is a giant state, but also we've got the whole western US that we can pull from and really dive in deep on the challenges that the West is facing. While still making sure that we're talking about things that are relevant to the entire ASLA community, but I do feel like I just went out there a couple of weeks ago to a conference and met with people in LA to talk about water and I felt like. Like I learned so much, even though I'm in a different part of the country, but it's still something that I can apply to what I do, which was really great."}, {"p": "Gretchen Wilson", "m": "Fellow (FASLA)", "c": "California", "t": ["Career Development"], "q": "I think. There really is just nothing like ASLA that can enrich your career to its fullest. I feel like no matter what size firm you're at, no matter where you are in your career, there's something for you at ASLA and to really experience it at.Every point in your career is so great because I feel like there's just different experiences and different takeaways at every step that are so helpful to your career, and I feel like the value lies in Also, just supporting each other in what we're doing, like sharing your ideas and being able to learn to be a leader. That's been amazing for me and I never would have expected.Becoming such more of a leader within my profession and I think ASLA really helped me to do that, so."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Career Development", "Volunteering", "Fellowship"], "q": "My name is Hitesh Mehta. I am the president of HM Design, a bespoke, strongly ethical, holistic design firm based here in Fort Lauderdale, FL, and I am a fellow of the ASLA."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Membership Value"], "q": "I've been a member of ASLA for I would say probably about 36 years now. I started way back in 1989, I believe."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Education", "Advocacy", "Career Development"], "q": "I was working for a firm in Oakland, CA, Amphion Environmental, when I joined as a professional member, I was a student member in 87-88 when I was a student at University of California, Berkeley."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Conference", "Career Development", "Education"], "q": "For students, ASLA offers some amazing opportunities. One is to do with career growth, so if they're looking for jobs, ASLA is a great place to be to go to one is not only the website and all the information it provides there, but also the national ASLA conference is the with the job fairs and everything that goes there. Very important. As a student, you get the opportunity to rub your shoulders with some of the heavy weights. In the profession, when you go to the conferences, it provides you a lot of inspiration through the webinars that ASLA organizes, through the keynote presentations, the inspiration that's provided very important for students."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Advocacy", "Membership Value"], "q": "I joined ASLA and I know actually I've been a very strong advocate of professional member organizations, in fact, to the point of insanity for the past 30 years. I've been paying subscriptions to four international professional organizations and eight non-governmental conservation organizations 30 years, so I'm a fellow of the ASLA. I'm a fellow of the Royal Institute of British Architects, and I'm a fellow of the Architects Association of Kenya and an affiliate member of AIA, the American Institute of Architects, so I'm a strong believer and there are three main things that membership brings. For ASLA in particular, I would like to mention that right."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Networking", "Membership Value"], "q": "One is professional development and networking #2 is resources and knowledge that's offered by ASLA and #3 is community and inspiration, and if you would like, I would I can, and go through each one of those and highlight and then say why I chose to become a member of ASLA and I continue to do so, and I'm like an ambassador of ASLA around the world, not only here, so."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Networking", "Career Development"], "q": "When it comes to professional development and networking, there are 4 main things, right? The first one I would say is career growth and I talked about it a little bit, but this is an opportunity also as a firm. If you are looking for people, ASLA is a great place to go to search for those people. It helps with the networking as well in the profession, then the other thing is staying connected. I would not be in touch with some of my colleagues from Berkeley from the late 80s and then when places I worked, whether it was at MTN Environmental, or at EDAV in San Francisco or at EDSA in Fort Lauderdale, it keeps it you connected. It's very important. The third thing is building alliances. What ASLA helps you is that it helps you build. Alliances with other professionals."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Networking", "Conference"], "q": "You build this professional relationships, so if you, for example, looking for a landscape architect of record in a in a particular city out of state, ASL is a great place. You can you meet all of these people. There is of course the when you're trying to do presentations, panel presentations at ASLA, right? If other people and you get to know them through ASLA, you can actually make a stronger case for your panel presentation, because I do a lot of panel presentation applications over the years and I tell you it really helps build that associations, and then finally, when it comes to professional development and networking is the professional recognition."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Publications & Resources", "Career Development"], "q": "I proudly. Show off my fellow title in every document that I write in emails and everywhere because it helps build credibility and through credibility as a firm you better chances to get. Jobs and that makes a difference, right? Then the second important reason is the resources and knowledge. I would say that the Landscape Architecture magazine and the as a hard copy magazine. Is probably the best landscape architecture magazine in the world, and then the online magazine by Jared Green, The Dirt, I would say it's probably is the best online landscape architecture piece out there, so these are great resources that are provided, information on the Latest projects, information on innovative stuff going on out there, information on the latest materials and products, etcetera, right."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Education", "Conference", "Advocacy"], "q": "There is of course the ASL Expo when you go to the conferences a huge space just dedicated to all the firms and all the latest that's coming out there. Right, and at the conference as well, what ASLA does as resources to provide resources are the fantastic educational sessions. I've been involved in many of them. I've attended so many of them, and so you're always learning and at this particular at this conferences, right. There's of course the webinars that you ASLA does. There are the workshops in the ASLA Expo floor. All these are very important resources, and finally, there is the policy and advocacy that's provided by ASLA. It fights for the profession and so that it doesn't get killed by a lot of these politicians around the place, right."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Networking"], "q": "Finally I'll end it here is that ASLA also. For White's community and inspiration, so if you go to the ASLA National Conference, you've got the alumni cocktails, you've got the LAF Foundation meetings, the dinner, not the dinner, but the cocktail as well, here in Florida, our office organizes every five years an eco social for all the members here in this region and we get people coming in from Miami, from others, other counties that come to our meetings for networking and for getting together, and we organize an eco social, so we bring in companies that are making the latest eco friendly products, furniture especially products and we bring them here in lighting and etcetera."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Conference", "Networking", "Awards"], "q": "Then the inspiration that's provided by ASLA.Through the keynote presentations at the national conferences, through the member spotlights, the testimonials as well, etcetera, are all very important part of providing that connection in the community, and finally, I would like to end with the way ASLA addresses challenges, and I've been involved in it, so for example as a member of ASLASLAI was brought in as an advisory member in the creation of some of the an award-winning documents or you can't see that because of the there you can. This is the Climate Action Guide Field Guide, and now I've been in I was also involved in the Climate and Biodiversity Action Field Guide. Hopefully that will win an award as well, just like the previous one, and so these are all these."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Membership Value", "DEI & Inclusion", "Sustainability & Climate"], "q": "The climate issues, inner city issues, diversity issues are all being handled by ASLA, and that is why I am a proud member of ASLA."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Fellowship", "Networking"], "q": "A lot, it when your peers recognize the work that you have been doing and you and you get that fellowship, just that whole the fellows dinner when people are inducted, that is like the Oscars \u2014 event it's beautifully done. I knew my father was there at my when I got inducted. It's a very special moment, and also when you get recognized, it also gives you a lot more confidence to go out there and do something more for the profession, and I've been a mentor over the years to students from all over the world who want to either get into the profession or who are looking for work and trying to figure out what's the best way to get there, so these are all very important things that ASLA. I hope I've answered your question."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Conference", "Publications & Resources", "Membership Value"], "q": "Ay, yeah. I would say, Oh my God, that's a tough one. I would say quite a few things. I would say being the Landscape Architecture magazine and the information and I get all the time, all the alliances that I have made at the conferences because members. In my case, a lot of the times because I'm presenting, so it's free registration and so that helps a lot, right, because I'm a very small firm and we've got very tight budgets, so getting the some of these benefits. Of freeze registrations because you are a speaker and you're all that really big difference."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["Networking", "Career Development", "Membership Value"], "q": "I've been doing that actually for about 1520 years now, so it's all about, I think the three things that I mentioned to you, the three main reasons career growth, we're talking everything, community and inspiration, learning, it's all about learning because you learn so much from being a member of ASLA about the latest on what's going on out there, what other people are doing, how they are doing it. It's very important, all the access to products and materials, and all this innovation, all this is very important."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["International"], "q": "I think I would like to say that when I am talking about ASLA, especially at the IFLA level, because I'm I've been a long, I've been a member of the International Federation of Landscape Architects and I've been attending their conferences for 33 years now, and I've been attending ASLA conferences and I attend a lot of different conferences. I can say that ASLA is a really well-oiled engine. That's how I present it. Very well organized, very well structured, and it's a just a wonderful organization to be a member of."}, {"p": "Hitesh Mehta", "m": "Fellow (FASLA)", "c": "Florida", "t": ["General"], "q": "I can, I can add that it is led by a most amazing guy in Tory and he has since he has taken over. I've just seen just great things happening to the organization, especially at the world level.
