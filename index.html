We are now back at the planetary level as a serious organization and I would like to thank Tory and everybody else underneath him who has made this happen."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Education", "Membership Value"], "q": "My name is Ji Han and I've been A. NESLA member since I was A, student at UC Berkeley, so now it's about three years."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Networking"], "q": "I think mostly because I was able to access A, lot of resources and support that really made A, difference for me. For example, when I was looking for A, job, the network and connections really helped me learn. More about the opportunities and stand the industry better and connect with people guided me along the way, yeah."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Education", "Career Development"], "q": "I recommend it because it has A, lot of webinars and lectures which have been A, great way to keep learning even out of school and work and they gave me fresh perspectives, and skills that I could bring back to my projects, so I highly recommend that."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Networking"], "q": "I think it's A, connection. Yeah, for me, it's A, connection, so I was able to attend the annual ASLA North California Chapter meeting. Earlier this year and I met A, lot of like people who work in our industry, in our field and we like build connection with each other and then keep the connection and I think that connection really helped me. Mhm."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Membership Value", "Publications & Resources"], "q": "Unfortunately, no. I all I have A, the online resources with ASLA, so I kinda wanna get some physical resources that the membership provides, and I think it is worth it. Yeah, I'm considering. Guess so, yeah."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Networking", "Membership Value"], "q": "I kind of, as I mentioned, I really like the connection with each other and some events they are just open to people with the ESLA membership, so I kind of want to keep the opportunity to like get to the activities like that and also at the same time, as I mentioned, enjoy the webinars and lectures and maybe in the future more physical resources in the future, so I will."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Membership Value"], "q": "I really want to take advantage of both the in-person and the online benefits that provided with the ESLA membership."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Membership Value"], "q": "Hmm. To be honest, I think I should take advantage of my ESLA membership more because currently I use it for the tickets to activities and also. Online physical resources, but I as you said, I have to, I can explore more attention, more potential of it and then take more advantage of it, so now on, even if I think it's, it matches the value, but I can definitely explore more potential about it, yeah."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Membership Value", "Education"], "q": "I've discovered more value even after three years of being A, member, and there's more to learn."}, {"p": "JIE HAN", "m": "Emerging Professional", "c": "California", "t": ["Volunteering"], "q": "After being A, member for like 3 years, I appreciate all the help, all the resources that I got and I want to give back to the community that supported me, so I'm currently running for the at large. Number position for the ESLA North California chapter. Yeah, I hope to contribute my time and energy to help other emerging professionals succeed just like I've supported. Yeah."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["General"], "q": "I've been a member of the ASLA for three years. I was a member many years ago and at that point in time it didn't work for me. It was It was Too focused on licensure, and it was too focused on testing people based on old skills, drafting on drafting boards and not using current technology, and it's changed significantly. I've seen that since I've been a member recently. Do you have more questions or do you want me to launch into? My."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Networking", "Membership Value"], "q": "I originally joined when I first came to the United States. I was working with the Department of Transportation in Arizona, so that must have been about 30 something years ago, and I worked with the Members there. I didn't. I've been introduced to the whole idea through mentorship."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Sustainability & Climate", "Education", "Networking"], "q": "I used to I worked and was mentored by a guy called Mark Turnbull, who had studied with Ian Mccarg and I met Ian Mccarg and I ended up going to a landscape program graduate program in Manitoba and Canada to study landscape with ecology and when I got to the United States. I was I was introduced to new technology. Technology and using computer aided drafting with some of the earliest systems that there were and I put that into practice and I left because. At that time, I was, I'd finished a $2000,000 scheme traffic intersection in Arizona using all native plants from the Snortn desert, and I was directed to replace some of my plants with an introduced plant. From Brazil, and I thought, OK, I've had enough. I'm going to focus on the technology side of it. I love the design side of it, but I but I it's the technology side of what I can do in 3D drafting and managing data about plants and the environment and the ecosystems that engages me, so that was why I initially left and I went back when I met people in San Francisco that were part of the ASLA and. Realized that the focus was more about biodiversity and native plants than it had ever been previously, so I wanted to get reengaged and I did."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Networking", "Sustainability & Climate"], "q": "It's. It's about mentorship. It's about what I can learn from other people. I've been sitting in on some of the group discussions about recent one was about. Disaster recovery, and you've got a panel with 12 knowledgeable people talking about. How they went about addressing the issue involving native plants and involving proactive steps. To be prepared for disaster in these states, so the whole environmental conscious part of being a part of the ASLA and the fact that it's, I think it could be more inclusive than it is, but it is a place that generally we all share the same concern about the planet and climate change and all of those things that we're currently being told doesn't exist."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Education", "Networking", "Volunteering"], "q": "Me people, so yeah, it's a It's a place where I feel at home and I feel a place I feel I can not just contribute, but a place that I can learn a lot."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["General"], "q": "It doesn't but the potential is there for it to do just that. I say it doesn't. First of all, I should just clarify that. The licensing thing was because I was moving every year to a different state for 10 years almost and having to redo something that I'd already been proficient in was just crazy. So."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Education"], "q": "Back to your question again. The contribution that I think I can make is I read again from the ASLA because the information's all there that in education. The most used software by landscape firms was AutoCAD and Photoshop, and I was using AutoCAD and Photoshop 25 years ago, or not. Maybe not Photoshop, but it's all technology and I'm current with the current technology where I can design and have a virtual walk through of my design with a client as I'm doing it and I haven't met. A lot of landscape firms, maybe Sasaki is an exception, but I haven't met a lot of landscape firms that have adopted that kind of kind of technology, but also don't even seem aware of that technology. I watched yesterday. For example, I watched a webinar where somebody took four photographs of a building and turned it into a 3D model in like 25 seconds."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Education"], "q": "You can do the same thing with plants, and I talked to a guy who does scanning with a drone and he can he can complete. The survey, in a fraction of the time the old technology. Involves and it has data where you can see like the data might relate to the carbon footprint of the different materials on the site, and again, it's not really something that's there, so one of the things I want to bring to the SLA is an update, an awareness and a sharing and some kind of learning forum of that new technology. I do. I do. Currently I do classes through places like UC Berkeley extension, but I and I train. Companies privately, but it's my motivation is always education. It's not selling the products behind these technologies, understanding what they actually do and how they can help the profession to excel."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Conference", "Sustainability & Climate"], "q": "The. Ecology and restoration. I think it's called. I'm doing 2 online presentations for them."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Networking"], "q": "There's just a few comments I'd written down is that the biggest issue I run into is, not being able to facilitate people in connecting the dots between all the information and data that's related to the work that we're doing. I'm currently devoting Douglas to me books because he's one of these people that bridges that gap between entomology and planting, but making that available. In a data set inside standard products that can be customized like Revit is what I'm trying to do at the moment, where you can search on criteria, find the plan and then pop it in and then see your design in 3D.My thought on that is the ASLA is It's a little bit of one of those thought silos that I encounter. I've been an architect. I've been a landscape architect. I've been an ecologist, and what I'm seeing is Presented at the California Native Grass Association, and had a room full of like 300 scientists and their information on Tallgrass Prairie and how it worked was invaluable."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Membership Value"], "q": "The research that they were doing and being and they gave me ideas about other things that I should put in the database, like germination time for seed, or which nurseries carried? The locally. A general type correct plant to for you to be using in these kind of situations, but I think in general there's a lot of people that could contribute to the ASLA and what we're doing and there's not a membership for them. There could be like AI would call it like an advocate membership. You pay like $50 a year or whatever."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Networking", "Career Development", "International"], "q": "I'd mention the one other thing that I'd mentioned like other people in related field, but also the people in technology, the people that are creating the deliverables online in internationally for large firms are technologically based."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["General"], "q": "Mebody that knows these has these skill sets could be a part, but doesn't want to be registered as a practising landscape architect, and doesn't want. To get and it's a valid thing to get. Publicity for that service through the ASLA.They're just interested in the environment and how they depicted in 3D, as scientists are just interested in understanding and connecting all the dots, and it doesn't seem there's a place for them either so."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["General"], "q": "That would make perfect sense. It's the, it's the implementation of landscape design that I'm doing."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["General"], "q": "That's $8.I've actually got my virtual headset. That's the one I use most of the time."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Networking", "Membership Value"], "q": "I won't take up your time, I think. I think I've made my point about. I think that the other the reaching out to other people I think is critical in making it possible for them to be members and incorporating technology, that isn't as old as I am is a good idea so. That's what I'd be plugging."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["Publications & Resources", "Awards"], "q": "I've got. I've got an art. I'll be a short article in Grasslands magazine, but I did say I'd try and make some submittals for the ASLA outlets that you have, so I will get to that when I'm finished my deadline, which is today."}, {"p": "James Cowan", "m": "International Member", "c": "California", "t": ["General"], "q": "A preferred headshot. Oh my gosh, I don't think I have one of these. I'll talk to my daughter."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Volunteering", "Conference"], "q": "My past involvement with ASLA is varied and kind of long. I have served locally as a member of the ASLA Minnesota Executive Board Education Leader for that group, one term of that. I've also served on many national ASLA pieces, the Laces Review Board, the conference committee. I forget your guys' acronym, sorry, and the when the when the conference was in Minneapolis, I was on the field. Session. I led the field session. I don't know how you put this. I led the field session."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Volunteering", "Conference", "Membership Value"], "q": "I guess. Yeah, right. There you go. I couldn't remember. I can't remember the name, so yeah, I led the I led the field session post chapter committee."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Volunteering", "Conference"], "q": "I knew there was an A in there. Yeah, my current, my current involvement is on the ACEAC, the committee, the conference committee."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Awards"], "q": "I'm a member of that group. This is I'm in my third year, my third year of the term, and we review all of the submissions once they come in, but more importantly, we also describe and discuss the categories and how to frame the call for proposals and we also reach out to members to suggest and encourage them to submit."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["General"], "q": "That's fine \u2014 thanks see you then. Oh my gosh. Yeah, I didn't. I didn't. I read through them all. I'm trying to find back to my the e-mail."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["General"], "q": "What? Tell me to understand what's helpful to you at this point because I certainly could talk to most of them, although probably the ones that stand out to me most would be what, why the depth over breadth was the one that I was thinking about, but any of them that you feel like you need some kind of."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Conference"], "q": "Unds good, so when you're choosing how to prepare for the conference, your proposal. One of the things to keep in mind is that session attendees often prefer sessions that prioritize depth over breadth."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Conference"], "q": "In other words, they want to come to a session to learn something in more specifically than at a broad overview level. An example of that might be when you're giving a presentation about a project, instead of just giving the pretty pictures and the overview of how it looks at a finished state, diving into some of the construction details and the assemblies and how they came together and the material stories and. The construction stories and the related conversations with the owners in order to get some of the really innovative parts of a project built, designed, accepted and working really well within the project."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["General"], "q": "It's striking a balance between that deep level of detail that someone could bring. Back and using their own work versus staying at a really high level and not getting down there because most members really could do some of that work on their own. They could look your website up, they could read something about the overview of the project, but. The magic is really in the stories, the deep stories about how the project came together and the ways in which someone could bring that into their own practice."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["General"], "q": "Focus on in order for someone to stay on time and make sure they can get a good story developed within the time frame they're given. Focus on a few really compelling details, not the whole project story, everything about it, but really dive into to some key elements that were innovative and how they aligned all the way down to those deep topics of either. The design story or the constructability story, or the way in which you worked collaboratively across teams, but instead of trying to get into the whole depth of the whole project, really just try to focus on a few key points."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["General"], "q": "If I was applying, I would think about collaboration as a key element of the proposal by maybe inviting a key collaborator from another discipline, possibly an owner's Rep, someone on the on the client side that's receiving the project and can discuss how, that collaboration happen because those compelling stories about interdisciplinary collaboration or cross team collaboration is also a great way to build depth and build depth into the story of how a project works, particularly if you can get into some of the Methodologies that you use to collaborate or some of the innovative ways in which the collaboration took place, whether that's interesting details about who the collaborators were, whether it's a really unusual disciplinary person, or possibly just the way the owner and the designer in the contract.tractor work together."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Education", "Networking"], "q": "It's really important for landscape architects to lead the a project and a collaboration effort because we're just set up so well to have that larger overscale view of everything. We have always been taught and learned systems approaches to all of the work, and I think that sets us up incredibly well to lead teams to think more at a high level and systematically throughout the whole project, whether that's focusing on a detail but still connecting it back up through the chain. To the larger project principles, the sustainability goals, the ways in which it has to come together on a cost basis, etcetera."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Education", "Networking", "Advocacy"], "q": "It's always been a strength of landscape architects to think in these systematic scalar ways, that really support collaboration and I think it's a key part of what we bring to the professional fields of environmental design."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Education", "Advocacy"], "q": "It. ASLA supported my career over my time, 30 years plus at this point in various ways. I think the things that I'm most appreciative of are the ways in which they advocate for the profession, both at a national level and at a local level. The ways they celebrate the great work that we all do and create visibility for our project work and the ways they support our educational programs through collaborations with the local design programs, whether that's internships coming in to do reviews, hosting events that include students and just the general support of the profession."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Networking"], "q": "Overall, I've always felt like it's a strong community and I was a part of it, whether I was two or three years into the field or at this point 30 years in and in a more of a leadership role. I've always appreciated knowing a lot of other landscape architects and being able to think of them as friends, colleagues and kind of like collaborators and making sure that our work is important and valued by our public."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Membership Value", "Conference"], "q": "It's. I do find value with my membership with ASLA continue to A lot of that value comes down to what I mentioned before about just the advocacy that it does in the way that it creates community, but I also appreciate the work at the national scale in terms of, organizing the conference, creating an awards program that's really visible and creating educational opportunities for us that are offered in a variety of formats, whether that's online or at the conference or, supporting the vendors and the sponsors of ASLA to come and show their work and show their products, so we have a pretty comprehensive understanding of how the field is changing, how the products are supporting it, et cetera, so I think I've always appreciated the ASLA's role in all of that."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Membership Value"], "q": "It's not something any individual could do by themselves, and we really need the society to create that value for us."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["General"], "q": "I would make sure that they have a really key. Point to their presentation in order for it to stand out. I would want to have a very clear, learning objective or a set of learning objectives that guide it so that we know what's unique about it and what the intended outcome is, and also framing it in a way that is somewhat creative in terms of either it's title, or it's scope so that it offers something that an attendee would see and think that's interesting. I'd really like to attend it."}, {"p": "Joe Favour", "m": "Member", "c": "Minnesota", "t": ["Networking", "Conference", "Volunteering"], "q": "I just encourage people to participate. I think it's a great way to give back to our community and prepares, prepare a proposal, come to the conference, participate willingly, talk to people and network. That's how we grow our field and that's how we all get better collectively."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Education", "Advocacy", "Career Development"], "q": "I was aware of it as a As a student, I was a student member, but it was at right after my first job. We were trying to be more engaged professionally."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Advocacy", "Volunteering", "Membership Value"], "q": "My the place where I worked, all of the landscape architects, there were members and introduced me through our state chapter meeting, but no, the company didn't pay for it was just something that we did as a professional obligation."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Education", "Networking", "Volunteering"], "q": "I was a student member, but not the entire time that I was a student. There was kind of an on again and off again relationship with our student chapter at Ball State while I was there."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["General"], "q": "One of my favorite things about ASLA is just the democratization of design that you can rub elbows with some of these. Great thought leaders and have access to that in ways that there's no other way that I would have been able to connect with these professionals, and that single thing helped grow my perspective on design so much. It's very when you get into design school your apertures is huge, but you're trying to open the lens of the profession up as quickly as humanly possible, and it's so hard to do that unless what some of the great work that's being done and that happens so specifically through ASLA through things like the awards, through things like the annual meeting that I think it's hard. In so many other ways to achieve the same goal."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Advocacy"], "q": "Here's what I was thinking, Dan I really wanted to talk about government affairs advocacy work."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Advocacy"], "q": "Many of a SL, as so many of our Members, so many landscape architects around the country work for small businesses, and there's no greater thing that we can do. There's no greater non market strategy that we can do to increase landscape architecture professionally, increase our revenue, increase the work that we're able to do than government affairs advocacy work, and that happened so effectively through ASLA.It's hard to do that as an individual."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Career Development", "DEI & Inclusion"], "q": "I it's interesting to think about just like minded individuals and I used to say that when you came to ASLA, it was like everybody spoke the same language, and so you were within this group that just intrinsically got it, but the more I've been involved with the organization, the more I realize that there's such a great diversity of perspectives that are offered people with different practice types than mine or different focus areas. Within their organization, maybe they belong to multidisciplinary firms versus landscape architecture only firms and those perspectives have really helped me grow in the way that we approach our the business of landscape architecture here at Troyer Group."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Networking"], "q": "I think the when you talk about professional networking though the opportunities to bring all of this group of people together doesn't happen any other place, and as much as it's great to maybe see some of these other conferences, when you bring together that group of landscape architecture architects all in one place, when you bring together that group of landscape architects all in one place, it gives us a specific. Opportunity to Meet with old friends. Connect with people who maybe you haven't seen in a long time, as well as seeing some of the best practice of the moment. The profession has evolved so much over the time period that I've been involved with ASLA.That it's fun to be able to engage in new and different ways every time as well."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Networking", "Advocacy"], "q": "I'm excited to be able to help in any way. There's we used to say that the deeper you get, the more value you saw in the being involved with ASLA, and I think that while that might be true, it's there's so many other layers of that type of Perspective, right. Like if you're a student coming to ASLA right out the gates, there's value to be had, right? And you don't really even have to look that far. To find ways to connect with people or to see the great work that's being done. If you're a student, you can find value right away. If you're an emerging professional thinking about things like licensure or trying to figure out your own voice within the profession, there are OPP.Right away and you can get value right away from doing that."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Education"], "q": "I got a freshman at Indiana University not studying landscape architecture, which is hard, but I understand."}, {"p": "Jonathon Geels", "m": "Student Member", "c": "Unknown", "t": ["Volunteering"], "q": "What's really wild is actually their ASLA journey. They've had so much involvement with all of the different things that I've done, they've come out for advocacy day, they've."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["Career Development", "Membership Value"], "q": "Name is Jose Juan Terrasa-Soler. I'm a partner at Marble Architects and Landscape Architects. I'm in the San Juan office in here in Puerto Rico and I've been a member of ASLA for 12 years."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["Sustainability & Climate", "Conference", "Education"], "q": "I have been involved in the Biodiversity and Climate Action Committee for the past two years, and I've been involved in the Annual Conference Education Advisory Committee for the last two years as well."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["Career Development"], "q": "Landscape architecture for me is a second career. I was an environmental consultant for many years and then I left everything and studied landscape architecture, so I joined ASLA when I.Oh, sorry, I'll do that again. Landscape architecture is a is a second career for me. I was an environmental consultant for many years and then I left everything and studied landscape architecture, so I joined ASLA when I finished studying landscape architecture practice for a couple. Years here in Puerto Rico and then join Marvel, when I joined Marvel, my current firm, I joined ASLA 12 years ago."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["Education"], "q": "ASLA connects me to the broader practice of landscape architecture and it's very important for me because I also teach here in the graduate program in landscape architecture at Polytechnic University of Puerto Rico, and that connection between private practice, education and the broader practice of landscape architecture is important, and ASLA enables that for me."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["Publications & Resources"], "q": "I think the publications of ASLA are most supportive of my practice. I go back to the magazine constantly for inspiration, for technical ideas. The conference, also the annual conference is very important because it's a personal connection. To other fellow landscape architects and also the education offering of the conference is very important."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["General"], "q": "Technical complexity and then there's another one, the first one that you that you just mentioned."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["General"], "q": "All right. I think the practice of landscape architecture is very complex, it's a very technical field and one of the things that we're looking in the committee is proposals that address that technical complexity, so we're looking. For proposals that go deeper, not just general, that touch on the topic, not general, not just generally, but also that go deep into the topic and provide how to's regarding that topic and provide answers that are beyond the general knowledge."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["General"], "q": "That could be one. In the past we made a presentation last year with two colleagues and that presentation went into the details of each project rather than covering just the generality and the topic was resilient hubs. How do you design resilient hubs? And by using case studies and going into the process of design, but also the process of construction in some cases, we went into the know how of how to actually implement those projects."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["Advocacy"], "q": "The other one, yeah, the other one is about the, I think it's the first one is about the other allied professions, and OK, let's see. The other thing is that."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["Networking"], "q": "Landscape architecture is not practiced in a vacuum, so we practice with other colleagues from other disciplines that are important to our job as landscape architects, so at the committee we're looking also for proposals that incorporate. Other disciplines like architecture, engineering, environmental science, the community, because there's also a base of knowledge in the community that is important, so those proposals that incorporate deeper knowledge from other disciplines are interesting and we'll lookout for those."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["Sustainability & Climate"], "q": "Landscape architecture is complex because it is about the human environment, so we have not just human, social, cultural needs, but also environmental needs that need to be addressed in every project, in every design, and we cannot cover all bases. We cannot cover all disciplines ourselves, even though as landscape architects, we're generalists, but we cannot cover everything, so we depend on biologists, ecologists, environmental scientists, engineers, architects who sometimes, many times work for architects. To complete our projects and how our projects belong to a greater context, so we have to bring those that knowledge also and make it part of our process."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["General"], "q": "Many times landscape architects are the leaders of projects, so they're called to bring in those other professionals and make decisions on which disciplines and which professionals are pertinent to a project, so yes, landscape architects are In the leadership position many times and have to be knowledgeable of what other professionals can offer for a particular project."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["General"], "q": "I have been involved in education for many years since I came back to Puerto Rico in 2007, and I think education goes beyond getting a degree. We have to educate ourselves as professionals spontaneously, and the annual conference is the perfect place. Ways to do that, so being in the Education Advisory Committee is important for me because I want to help shape what the needs are and what we can offer to other professionals for continuous education, and being abreast of what's happening in the discipline."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["Conference"], "q": "That's fine. You should submit a proposal because you are contributing to education of your fellow landscape architects, and I think that's something that you will enjoy the annual conference even more if you present a panel and you participate in a panel and you will feel that contribution, that personal contribution, that you will make conference."}, {"p": "Jose Juan Terrasa-Soler", "m": "Fellow (FASLA)", "c": "Puerto Rico", "t": ["General"], "q": "I think it's important that we have diversity in the proposals that we receive in terms of not just disciplines, but also geographic area, so we encourage participation from a broad, very broad base in terms of Disciplines that cooperate with landscape architecture, but also geographical areas. Next year the annual conference is going to be in LA in Los Angeles and we expect to have a few proposals from the West of the United States and that's fantastic and we want to have that broad participation, not just from the States, actually from the Caribbean as well. We have ASLA members here in the Caribbean, so we'll be looking out for that."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Membership Value"], "q": "I've been a member of ASLA since 2016.I wish I had joined earlier. I had some other priorities but haven't looked back since. It's been absolutely incredible."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Membership Value"], "q": "I joined Ansley after a series of trying to get certain credentials, so I had gone after lead AP first and then I got my first license in California and then and then I joined ASLA and part of that was that the firm was supporting memberships and licensure \u2014 so the fact that I didn't have to pay out of pocket was a huge incentive."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Membership Value"], "q": "ASLA membership matters to me because it helps me feel like I'm part of something bigger, so we can so often get trapped on our own worlds and think that we're changing the world and we are one step at a time, but to see kind of the collective and the breath of landscape architecture, it's really becoming even wider and more recognized in terms of what the value we bring, so to be able to see how everyone else is coming to the table is \u2014 extremely impactful and encouraging as well."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Networking", "Education", "Membership Value"], "q": "The intangible benefits of being a member of SLA.It's most likely or I should say undoubtedly just the connections kind of that being able to network, being able to just be part of something broader, even just connecting back with old colleagues or college classmates, you've lost touch with It's really a conduit to make a lot of connections or even feel like you're connected to someone you don't even know. By reading their story or hearing their testimonial about a project, or even seeing them at ASLA conference. It just helps you feel closer to the people that you work with, even though you don't work with them directly."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Advocacy", "Career Development"], "q": "Being part of ASLA has really encouraged me professionally in just terms of being connected to the wider body. There's AIA, there's uli. There's APA.And so everyone has their organizations and our firm has multiple folks in it that have different aspects of those professional associations, and it's just again feeling like you're connected to something bigger. It also encourages licensure and understanding different aspects of the profession that I may not be able to touch on in my professional career, so I get to learn from others what they're working on, really interesting things that you get to see, and then, of course, the ASLA conference to me is the highlight of the year."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "T only do I get to learn from all kinds of folks that have been in this business a lot longer than I have, but I also get to learn things about myself that. Oh yeah, I do that too. I just didn't even think about it. It's just a kind of a daily thing, so it does. It's a great reminder of the impact you are making."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "For me, licensure is very important. It's definitely a milestone in your career to really say I've arrived at a certain point in my career. I haven't figured it all out yet, but I have enough information and enough experience to call myself licensed. It definitely does help you boost your career when you introduce yourself as a licensed architect or licensed landscape architect. It definitely has a clout to it versus I'm a designer, doesn't. Have as much significance to that it also. Is really kind of built up confidence that if you're licensed in one state, you can go get licensed in another state and they have different. Ways of going about that, but that's really encouraging that you can work in multiple states."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Advocacy"], "q": "Then I'm really encouraged that ASLA and other affiliates are really working towards making sure that licensure is something that is at the table to say that this is very important to be. To be discussed and we have a really huge impact on society, just like an engineer, an architect does, and we want to see licensure as kind of A kind of a level \u2014 of professionalism and care, practice of care and also just kind of a sense of dignity for the profession that if it's not licensed, it's kind of this outlier and we're definitely legitimate."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "I joined the Klarb seminars too, and they're like we're doing this and ASLA is doing this. We're working on this together. I'm like that's awesome cuz you don't really hear about all that and I'm not into politics and all that, but to know that there's people working behind the scenes, it's like, yeah, that's important."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "Certainly wouldn't want my license stripped, saying it's not important, we're taking it away from you."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Networking"], "q": "My encouragement to a colleague, that wasn't part of ASLA would just say, look, you need to connect somehow at least to get started with your local chapter, and then you can see the benefits of that and the local chapters are connected into the broader national network, but just to understand that there's so. Many different nuances between."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Networking"], "q": "For example, what we practice in Southern California from Northern California or Ohio or Connecticut, and just to see that when you can be a member of something larger than yourself, you really get a broad perspective, and it's a perspective you. Can't necessarily get on your own. It would take a tremendous amount of effort to pull together the information that ASLA gives us every month through newsletters, through magazine, through conferences, through even the professional practice networks, there's just so many things at your disposal to just advance your career and your knowledge of the profession 'cause I've always grown up knowing it's not how much it's how much you don't know that you need to you need to Learn."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Volunteering"], "q": "I think the other thing I would like to say is just I don't know how often the people behind SLA the chapter trustees, the Board of directors, all those that are behind the scenes, running everything. How much how much do they really get? A thank you, so I would like to just say thank you for all the work that goes on behind the scenes that nobody really gets to see. It's kind of a sometimes the thankless job. Nobody really understands how hard it is to do certain things so. Thank you to all those behind the scenes and. In front of the camera going out there, doing what he has to do. It's an incredible effort and definitely I appreciate it."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Education", "Volunteering"], "q": "That's the other thing. The great thing about volunteering is I think I would say for the students, sometimes you have, there's a sense of just join this club or join this society and you just sit at the background and you're just going to watch."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "Metimes that's OK to sit on the bleachers and just go. Let me just get an idea of what this is, but being involved is absolutely critical. You can't sit on the sidelines the whole time. You need to get involved."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "I've, I wish I would. Actually, I wish I was more involved. Most things happen on the weekend, which I'm not available to do or evenings, and I'm really trying to focus on family, so it is It is a balance of how much can you contribute to your career as well as extracurricular and family? And so it's a balancing act, but."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["General"], "q": "It's always just if you can just give a little and everyone just gave a little it all adds up."}, {"p": "Kirk Keller", "m": "Fellow (FASLA)", "c": "California", "t": ["Volunteering"], "q": "I have to keep that in mind that even though I'm not chapter President, I can still do things to count and move the dial."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "It was kind of circulating in our ex com and we talked about do we need to do some kind of member spotlights at a Texas chapter level, and I said I think that's a great idea, but let's join the bandwagon with the national member testimonials first and see what comes out of that and then maybe we can promote that. At our local chapter level instead of duplicating work there, so that's kind of how this all kind of came into play, at least for me, so."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Volunteering"], "q": "Awesome. Well, thank you. My name is Landon Bell. I am a landscape architect in Fort Worth, TX. I work for a firm called Park Hill. We're a multidisciplinary firm in several states in the Southwest. I do a lot of park and recreation design. I do a lot of faith-based design work as well as civic design work. I'm also past president of the Texas chapter as well."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Education", "Membership Value"], "q": "I have been a member of ASLA going back into my student years. I've been out of school for 10 years, so probably 13 or 14 years."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Education"], "q": "I As far as being encouraged to join ASLA, it really happened again in college. We our student ASLA organization is very strong at Texas Tech University in Lubbock, TX and, really just being in a in student ASLA in vote joining national ASLA as well."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Advocacy", "Membership Value"], "q": "I think membership matters to me because. It's a sense of belonging to my professional degree and professional calling. American Society of Landscape Architects is the only professional organization that. Advocates for licensure and practice for landscape architects, and it's also our primary sense of community internally amongst members, and it's also one of the primary touch points for professional development and education. Opportunities, so there's multiple levels to why it's important to be involved in the ASLA. As a professional landscape architect, I think it's critical that we all come together and unite. In the common good that advances our we're a small profession but we're very tactful and strategic when we come together."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Volunteering", "Membership Value", "Networking"], "q": "I think. Right. I think that as far as membership benefits, having the opportunity to Come together again for the events that are held in a in a community and networking standpoint. I think that's the most critical piece of everything my involvement in ASLA started. After I have my after college involvement started as a conference committee chairman and for the Texas State chapter and we're the we have we host the largest conference. Of the chapters and it's a really passionate group of individuals that really come together and unite for a common a common goal. It's a specified time frame and I really feel like that jumping in Brought out of college into that committee really gave me a passion for #1."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Volunteering", "Career Development"], "q": "I learned about I was a speaker committee chairman and so learning about the professional development requirements and soliciting. Those speak, the those speakers, everyone really united together and had a common focus for that year that it was really invigorating to be involved in that specific committee, and that really jumped me into leadership in Texas ASLA again leading all the way up through chapter president, so that really the passion to get involved and to be a part of ASLA I would say is the most benefit to me."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Career Development", "Volunteering"], "q": "I think it's most important to be involved in volunteerism and leadership in Texas ASLA because we are a while we while national ASLA has a An excellent staff that advances our overarching goals."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Volunteering"], "q": "It's a volunteer based organization and so from a chapter level all the way up through committee levels and the and even leadership positions at a national level, it's all volunteer based, and so number one, we need the volunteers, but #2 it's so important to get involved and be a part of the main organization that's impacting our profession of landscape architecture, so without being involved, it's hard to know all the all the benefits and aspects that the SLA offers to us and it's also important that we. Are a part of that team as we advance it forward."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Membership Value", "Advocacy", "Volunteering"], "q": "The question is how do the benefits of membership compare to the cost and I really when I think about the again the benefits of ASLA as I one of the critical tenants is defending licensure at a state level for landscape architects, specifically Texas chapter, the Texas chapter, but also national federal advocacy. Like I said, there's no other. There's no other organization that advocates for my licensure, and so that piece alone is worth it. It is worth the full membership in my mind at a state level, we. Have a chapter advocacy committee."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Advocacy", "Networking", "Membership Value"], "q": "We also hire a lobbyist and all that comes at a cost that's really visual and apparent, but it's really necessary because. At a state level, we have the people in the right places and the right connections that whenever anything comes up licensure related, we're ready to respond in that manner, so again going back just the thought of licensure alone, and that cost of the annual membership, I think in my mind takes care of that piece right away, and I think that's the biggest thing that we need to communicate is that ASLA is one of the very few organizations that are advocating. For our right to practice and really the United States."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Networking", "Advocacy", "Fellowship"], "q": "My elevator speech for why do you need to join ASLA would be. I'd like for you to join ASLA to engage with your community of landscape architects and build connections with, again, fellow landscape architects, but also allied professionals."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Advocacy", "Networking", "Career Development"], "q": "We do it in context. To offer Our events are geared towards offering professional development hours and also just building the connections with your fellow professionals that you work with on a daily basis and not only that we again we are the only. Professional society that advocates for licensure as professional landscape architects and you'll have the opportunity to see again whether you're involved in leadership or just a member you'll be. Privy to updates on what is what is coming through from a legislation standpoint and if you're involved in leadership you'll be able to band together and work towards those common goals for licensure, and then also really just a sense of a sense of pride and ownership in your profession I personally have seen, just fruits coming from the network of professionals that I've developed just through ASLA."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Networking", "Advocacy"], "q": "I would not have been able to develop that network outside just in the professional in the professional community alone."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Education", "Career Development"], "q": "I think that one thing I want to add is I think that it's most critical for the student to emerging professional conversion when you when you get out of school. You're really entrenched again in your new workplace in your new environment and it's kind of hard to see the big, the big picture you're in that transition zone, so I think I think the emerging professionals are a critical piece of engaging into ASLA mainly for if we can tap the emerging professionals, the passionate emerging professionals and get them pulled into leadership positions, that passion will really boost their careers from the very beginning."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Career Development", "Volunteering"], "q": "Again, it builds their network, it builds their professional skills and also just how associations work, and the leadership skills that come along with it and it will really, it will really bolster their careers, but also bring that passion and just compound throughout the career, so I think emerging professionals are one of the biggest. Areas of opportunity, I know we've made great strides with that on the national level with the Associate Advisory Committee and I'm really looking forward to we've started focusing more on more specifically on that at the state chapter level, and are really seeing some grapefruits come up about."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Publications & Resources"], "q": "I got a little roll out at the CPC of that and it was really exciting. Looking, I look forward to seeing that new website."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "Sir, OK.Sounds great. All right. Well, I'll respond with the pictures, the headshot and then title and we'll go from there. Appreciate it."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "Just real quick again, I kind of touched on want to be a part of this in a bigger capacity, but also."}, {"p": "Landon G Bell", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "The content that comes out of this is that is that content that could be shared out of state chapter level and kind of re-promoted that way. Cause what I would what I would love is for us to be able to send our leadership through this but also our chapter members encourage them to do these spotlights as well.well And then be able to kind of circulate the content at a chapter level instead of duplicating work, the good work that y'all are doing here."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Education", "Volunteering"], "q": "Certainly. My name is Laura Moffett. I am a full member of ASLA and I have been a member since 20-00 when I was getting my graduate degree at the University of Arlington involved with the student chapter there, and I have had various roles and at the state level I was, I'm a past Texas ASLA president and most recently I have been serving as the Women in Landscape Architecture PPN.Chair, which I stepped down from last year, but I'm still on the leadership team."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Education", "Volunteering"], "q": "Let me try this again. My name is Laura Moffett and I'm a full member of ASLA. I've been a member since 20-00 when I was attending Graduate School at the University of Texas at Arlington and was involved with the student chapter there, and then got involved regionally and have served as the chapter president for Texas ASLA. I've been on the PR committee, I've been a PR Rep and most recently. Served as the chair for the Willa and Landscape Architecture PPM."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Education", "Networking"], "q": "That is a really good question because that was 25 years ago and I do remember that we had an established SASLA group at the time and I knew I was a little bit of an older student, so I knew how valuable networking was and that it was important to get involved, not only at the university level, but also what opportunities the local chapter would be able to give me, and a case in point, I went to my first. DFW section ASLA happy hour in I believe it was October of 2000 and I sat down at a table with some people and I started talking with them and at the end of the discussion, Paul Fields of Lambert's handed me his business. Business card and said I have an internship starting immediately if you're interested and I was at Lambert's for 11 years."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Education", "Career Development", "Membership Value"], "q": "By being a student member of ASLA was able to meet individuals straight away and one of them led to an internship that then became an 11 year career with Lambert's and Dallas."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Membership Value"], "q": "Part of the reason is because I know how much good comes from being an ASLA member, not only on what it does for me personally, but what it does for those that are students and emerging professionals, and those are especially with women that are coming back into the profession and just the opportunities that are provided for basically every voice within ASLA."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Networking", "International"], "q": "Really the networking. It's allowed me to have friends and colleagues around the country. I call on some of them very much for mentorship, and not only is it's not formalized mentorship, but there's people I can reach out to if I ever have a question and everybody is so generous with their time."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "I'm not sure you're going to be able to state this, but the reason was as I just found that I didn't see after the section, I didn't see a lot of female in the role at the Texas level, and I wanted to be part of the change that made it that somebody could look at me and be like, oh, I if she can do it, I can do it as well, and yeah, and then afterwards, after I realized that I kind of hit a ceiling at Texas ASLA, I was like, I want to get back on the national level and affect change there where I think I can affect change."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Career Development", "DEI & Inclusion"], "q": "Very good. There's amazing women already on the leadership team, but they had been contributing for so long that they were happy for somebody to come in with some new ideas and with some new energy, so very receptive."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "I think now more than ever, it's to get involved and it's so important for individuals to see themselves being represented. Flip side, all of this is the two-way St. You get out of it as much as you put into it, so I think it's just beneficial for everybody, not only what you're contributing, but what you get out of it and to see different people's perspective, because if we don't see different people's perspective, then we won't know how well to lead."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "I'm not quite sure what else would make sense. I think maybe the one thing that I would say is that I hear from especially emerging professionals that they don't know where to start, how to get involved and I think the easiest thing for them to do is just show up, and take on a small task, even if it's just being a member at large, and then figure it out what it is that they really want to do. There's so many opportunities, both at the section level here in Texas, and then I don't think that a lot of them also know what's happening at the national level, and so for them to hop in on a committee, even if they don't feel that they are 100% qualified for that."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Membership Value"], "q": "One of the things that I do hear from older landscape architects early men, is how difficult it is for them to get like their CEUs and things like that, and I'm like, but ASLA, being a member of ASLA, you get one of those every single."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "You just have to sign in, spend an hour, do a quick test quiz and you've got it."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Membership Value"], "q": "I think one of the things would be great would be have just have a real simple graphic that is Instagram a bowl that each of us could set out that's like these are the benefits that you get and because I know that if you add up all of those it covers the cost of members. U easily."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "That's fantastic, anything that makes our lives so much easier to share it's just, yeah, I just love that. Thank you."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Membership Value"], "q": "I can't imagine being a part of our profession without being an ASLA member. All the benefits that I get from it and all the benefits that it gives. It's our membership is just so important, especially with The noise that we hear today, it's so important for us to have one place to go and get the information that we need, not only from the website perspective, but also, as I've mentioned before, just the networking, it's, that is the invaluable piece of it, and yes, you can network without being part of ASLA, but you are also getting benefits that. Far exceed being part of a membership team."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Membership Value"], "q": "There's. I think I should say one other thing that I didn't mention. I no longer practice as a landscape architect. I actually I'm on the vendor side and the other reason why I thought it was important for me to voice, and to speak with you was the fact that. I know that there are a lot of young people that are looking right now to figure out what the next step of their career is and they don't need to leave landscape architecture. They can stay within the profession. They can just maybe for a few years do something different and then get back into it or do what I've done and.In the manufacturer's RA and now I'm working for an artist studio."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Conference"], "q": "It's always those conferences are always, so chaotic and it's hard to meet everybody, so hopefully I'll meet you next year in LA."}, {"p": "Lara Moffat", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Membership Value"], "q": "I continue to keep my membership. As I just a full member and I will say I used to be not only a member of Texas but also Arkansas because I covered Arkansas and I felt that it was really important as an ASLA member who was had a territory of Arkansas to be also a member of Arkansas."}, {"p": "Liwei Shen", "m": "Student Member", "c": "Unknown", "t": ["Conference", "Networking"], "q": "I feel like I have a very strong connections with ASLA.I'm going to the SLS conferences and some small activities, some something like woman's invoice, woman's voice in landscape architecture and also I've been enjoying the game changer session. Two years ago where I got to know a lot of people there and I remember that year was about how indigenous communities could have a stronger unions to against climate change, which still I feel like is an important topic. For now."}, {"p": "Liwei Shen", "m": "Student Member", "c": "Unknown", "t": ["Advocacy", "Membership Value"], "q": "I think so \u2014 so three years ago and then I joined Sasaki and now I am planning to move to San Francisco and I will work for field operations. The company so my next employer need to apply for a new visa for me and so the immigration. I think the immigration policy changed year by year and this year they. It required a professional opinion from a peer group and ASLA is definitely our largest peer group, so I imagine I send an e-mail to the membership team and they are very happy to do it. They did it very fast and they sent the recommendation letter back, which I feel like is highly supportive and about that."}, {"p": "Liwei Shen", "m": "Student Member", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "I.Mhm. It's been, I think I was probably a student member. I have been working for three years, so it's three to four years."}, {"p": "Liwei Shen", "m": "Student Member", "c": "Unknown", "t": ["Education"], "q": "I think I would. I was probably as a member when I was a student. I do think it gives us a lot of exposures more to the students and I think they have very excellent. Programs for students as well, something like scholarship ASL has very strong connections with Landscape Architecture Foundation and the Cultural Landscape Foundation and the Landscape Architecture Foundation have some onset scholars programs and some other scholarships programs which I feel like. Those are highly connected to know those system better and to help them to promote themselves and something like that."}, {"p": "Liwei Shen", "m": "Student Member", "c": "Unknown", "t": ["Conference"], "q": "I remembered I was selected as a Onset Scholars several years ago and where I got some I think I got a lot of strong support from ASLA members from the GSDs and they helped me to write recommendations to the early lab and, when I joined the LLA lab sessions in the ASLA also got to know more people and some all the professors right there. I feel like I think, I think any those sort of exposure and experience would be super beneficial."}, {"p": "Liwei Shen", "m": "Student Member", "c": "Unknown", "t": ["Education", "Sustainability & Climate"], "q": "Of course, for sure. I'm very happy to, so I am in my undergrad. I studied, I studied architecture in my undergrad studies in China and then I moved to the USI started as a GSD for landscape architecture, so at this time I was like. A very fresh student coming to the US as a whole different nation and I feel like joining ASLA would help me to understand what is this course will look like and what's the attention they are being focusing on and something like I remembered. It was social justice, environmental justice and climate change, so sort of topics and which I didn't know that in my undergraduate architectural studies because these are different professions and cultural backgrounds."}, {"p": "Liwei Shen", "m": "Student Member", "c": "Unknown", "t": ["Education"], "q": "After understanding that I started to read the last. Landscape Architecture Maxines, which is the publications of ASLA and I've been engaging in BSLA session, Boston Society of Landscape Architecture sessions, which I got some very strong support from Gretchen, the head o dy who was an emerging. Professional, so that's how I got involved in it."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["Networking"], "q": "Then after that I was part of, I am part of the DEI committee, which right now because of many other reasons we're like. There's stuff happening regarding larger organization things, but I'm also part of the DEI committee and so it's been really great because we've met a lot of the people in the in the landscape field here in New York we're creating. A better community and it's not only about like DEI, it's just regular like all of us in New York. It's actually a very small, a small group of people of landscape architects and so it's nice to just get together and become a community."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["General"], "q": "For sure. ASLA has supported me in my lair journey. Of course they as I was saying I was had the opportunity to win this grant that helped me financially to apply to take the tests and I'm still working on them, so it's still a work in progress, but it's something that it was I think I would not have been able to make it without this support, because as you all know that New York is a expensive city and we all have different things to do. So it was an amazing help and support that I could I could do that as well as many. Webinars or events that were related to this, like how to prep for like a general introduction or specifically for each section."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["Education", "Career Development", "Membership Value"], "q": "I remember attending a lot of these, a lot of these webinars that explained the, also just like a general like test taking skills, also webinars that were also promoted in the past and from the ASLA which have helped me a lot, yeah."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["Volunteering"], "q": "For sure ASLA contributes, but I think it's part of us as landscape architects, it's part of who we are in general, so it's not a specific, it's something that any landscape architect would do so, but in this case as well. I think it's easier or it's more evident here in a city that is so diverse that you can really see the help that these types of committees or the ACLA as a as an organization can do, so as I was saying DEI committee that we work with it's not. It's not that we're only focused on POC people of color. We are constantly working with the education committee or other committees in the city. To promote the field of landscape architecture and also to inform people because that is that is the that's the most important thing."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["Education", "Networking", "Career Development"], "q": "A lot of people still don't know what's landscape architecture, so we work with for example the education community committee to go. To high school programs or we attend fairs, which I have been in two of them already for like it's a design high school over here and people are surprised that there's actually. A field or a career that you can you can you can do this and that's basically what we do in more in a specific I guess in the what's the reason the DEI is because. People of colour are underrepresented in a numbers that this is not a I'm not, it's not a I'm not making it up, but there's very few other people of colour in leadership roles. Right now, because of many reasons."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["Networking", "International"], "q": "Metimes it's because some a lot of the people are international students that they might have gotten a job and then they left the country, which is totally understandable, but then there's a there's also people that have. The need more visibility, so in our committees just to create that space for people to be more visible and I think is working and it's something that as I tell you we work with other committees, so it's not just like we just do one thing, it's about the community, it's about everybody, and yeah."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["Publications & Resources"], "q": "What resource I use the most that ASLA provides me, I think is yes, mostly the webinars I really like to or the yeah, the webinar events because you can easily access them like even if you're at the office you can just like have a Lunch break and just listen to one or have it in the background, which is super helpful and really they really like help you inform the really cool topics and relevant topics and the magazine which I do have a subscription for the digital one. I also it's easy to have it on your phone or the iPad and so it's those are the two, yeah."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["Membership Value"], "q": "I think the ASLA membership matters to me because it values, it gives us value to the profession and I think it's important to promote it and to have it and it is a it is an effort and it's something that. It's an additional thing to your professional careers, but I think it's it is important because if we don't give ourselves the importance then nobody will, so it's something that I think is it adds to us and I'm very proud of it. Yeah."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["Conference", "DEI & Inclusion"], "q": "M.I haven't because I haven't been to the conference the physical ones. I wanted to go to the last one in DC but I couldn't and but I am I'm curious to know more about those. I don't know after that happens we can access them is that."}, {"p": "Lucila Silva-Santisteban", "m": "International Member", "c": "New York", "t": ["General"], "q": "I'll work for the I'll. I'll look for something because it's been such a long time that I need new headshots, but I will look for something because on my mind."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["General"], "q": "To do it, but yeah, I didn't know what to expect from this, so you tell me if I just say my testimonial is OK."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Networking"], "q": "My name is Maria Nene Colom Mulero. I'm from Puerto Rico and I work on my own firm. I worked previously at Marvel Design and later I started my own firm on 2019 and I've been with ASLA since 2017 and it has helped me like in a lot of things from coming from an island. It has helped me like connect with people beyond the island."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Education", "Advocacy", "Volunteering"], "q": "After graduating, yeah, we didn't have a student chapter here and I started here in Puerto Rico landscape. My MLA is from Puerto Rico, so yeah, just after graduating and starting like my professional."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Networking", "Sustainability & Climate"], "q": "Mainly because coming from Puerto Rico, an island where most people don't know what we do and it helps me connect and see what other people are doing and, translating it into Caribbean context and ecologies, and yeah, I think that's like the most important for me. Yeah."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Sustainability & Climate", "Membership Value"], "q": "I started my own firm after two years working at Marvel. I just started like really like the least time, but I saw that there was A gap like there was no firm landscape architecture firm that like could have like 3D models like all the technology because most of the landscape architects here we're only 27 landscape architects, licensed landscape architects in Puerto Rico, so I thought that it was an opportunity and that's why I started like my own firm, and also because most of the firms I saw here were not very ecologically friendly or focus on water management, soil conservation, that is very important in tropical. Context, so yeah, that's the reason I started my own practice, and also there are two professional degrees here."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Education"], "q": "One, there's a bachelor degree and a master's degree, and there are many students like graduating and then don't have where to, or to do their practice, so I thought that was another opportunity, and yeah."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Career Development", "Advocacy"], "q": "I can't, yeah. Yes, on 2 on 20/23 I participated on the on the skilled, the professional development skilled on the first one I think it was and now I'm. I saw I filled the form for the one that I don't know the full name of the yeah."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Career Development"], "q": "I'm trying to get it and I purchased the same year on 20/23 that I participated on the skillet. I did like a start-up program here in Puerto Rico, but it wasn't."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Career Development"], "q": "Focus in to landscape, so it was more about product development and more for other types of businesses, but it still helped me with like all the financial parts and yeah."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Publications & Resources", "Education"], "q": "I think it you have to learn a lot from a lot of things, so you're going to keep learning all your life, so I think AFA like brings all those resources, and also for example with in the Landscape Architecture magazine, I learn about product systems that I used in my projects. Now we are there's one park that we designed, that is in construction right now and we use organic log and I learned about organic log from the Landscape Architecture magazine, so yeah, I think it's important to know your like. Your materials, your systems and your peers. Yeah, what your peers are doing, so yeah."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["General"], "q": "I recently I well, I worked with my husband and he's an architect and I have one intern and previously I had a junior and they. As everyone need to learn like more about the about everything, so I think ASLA is a very good research in terms of information and yeah like. If you want to practice landscape architecture, you have to keep up with the times and the climate and everything, so yeah."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["General"], "q": "I think I like. I think it brings more to my practice and also like the Like people can see you and know about you from ASLA, so I think it's worth it. I don't think it's expensive. With all the resources that and that and I also take a lot of the HSW credits from ASLA, so yeah, I like to put the conferences and. In while I'm like doing modeling or something that is not as it that doesn't require my attention so much."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Conference"], "q": "I'm like, really, I really want to go, but at the same time, like I have like a lot of work and I haven't had any time in the last few years to like to go to the conference, but I think that."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Membership Value", "Conference"], "q": "From what I've heard from other ASLA members, that
