is like really worth it to go to all this to the conferences and."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Career Development"], "q": "I hope I can attend this year and if I if I get selected for the skillet I have to go so I'll I will so that was one of the."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["Networking", "Education", "Sustainability & Climate"], "q": "That one, that one is not OK, so You should join an AFLA because it connects like it connects you to a broader community and helps you learn from different experiences, and different climates and it can help you like integrate that and make you a better landscape architect in the end, yeah."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["General"], "q": "Thank you. Yeah, I'll send it later today or maybe tomorrow, but yeah, I'll send it as soon as possible."}, {"p": "Mari\u0301a Nene\u0301 Colo\u0301n Mulero", "m": "Member", "c": "Puerto Rico", "t": ["General"], "q": "I hope that it was just the conversation. I was I hope it's not too remote, that was perfect. Yeah."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Career Development", "Membership Value"], "q": "I joined ASLA in 1979, so it's been what, three or four years that I've been a member, and during that time I have used ASLA to literally to build my career. It's been unbelievably important to me."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Education"], "q": "There was a student chapter when I was in undergraduate school and I don't know why I didn't join. I think I was just too focused on my projects. I you're a student, you're learning so much and the world is suddenly becoming so expanded by being in studio, all I was swallowed up by that and I knew there was an ASLA, but I didn't. I didn't pay attention."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["General"], "q": "I would strongly urge students to join, and not so much because things are overwhelming and ASLA can sort that out. What I have done with ASLA is it's been the basis of my network for all these years. It's, but it's 45 years or something like that, and I have found that getting to know other ASLA members has been fundamental to how I've been able to build my practice across, not just across the US, but also abroad, and so whenever I get an opportunity to talk to students, I do, and I do talk about ASLA when I talk with them, I just talk with one yesterday."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["International"], "q": "ASLA is it's the standard bearer for landscape architecture and that's indisputable and I'm hoping that ASLA continues to improve. We finally have a good relationship with IFLA again and I think we really need to start seeing ourselves as more of a globally based organization, not necessarily transporting the American part of ASLA around the world, but the professionalization, and the foundations that ASLA has created. To improve practice is invaluable to every landscape architect in the world and I think we can learn from them as well."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["General"], "q": "When I joined, as I said, it was 1979.It was very small group Ed Abel was the executive director. I got to know him very quickly, and there were maybe a couple thousand members of ASLA at that time. The magazine was really the sort of flagship of what ASLA represented, and through the magazine and the annual meetings, ASLA started to grow and to I used the word before to really professionalize and somewhat. Expand professional standards and knowledge across what at that time was a profession made-up of hundreds and hundreds of very small offices, and small offices working very locally on really nice projects but unaware of the breadth of the profession and how that. Profession was spreading. ASLA has been the vehicle by which. Most landscape architects have learned that they're part of a bigger world."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Membership Value"], "q": "I think that Sla's advocacy. To elevate the public's awareness and respect of the value that landscape architects provide is really important."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Networking", "Advocacy"], "q": "Licensure is part of that, but in many ways, licensure is a little bit on the defensive side of what ASLA does because over the years we've had. Perceived threats from some of the other licensed professions, and so. On and, yet ASLA has taken licensure from A kind of a personal thing that would be part of a person's professional journey to a threshold of competence, but a threshold of a sort of presence as a professional within your community of collaborators, and so on, so it's fundamental. Now off the record, I can tell you all the reasons I don't like licensure, and Lydia, I'm licensed in 26 states in two provinces, so."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Membership Value", "Conference", "Networking"], "q": "Both to Yes we do. We encourage people to join SLA and we do support not just their memberships, but we also support professional registration for everyone that gets registered and conference attendance and those kinds of things."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Education", "Advocacy"], "q": "It's just. You're an incomplete professional if you don't become part of ASLA and learn what it's all about and how you can grow as a result."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Career Development"], "q": "I and I lived with an NBC News anchor for many years, and so, like I said, I've been on TV a lot. I understand the TV business really well."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Conference", "Networking"], "q": "I have only missed one conference since 1979.It was the year my dad's 90th birthday was during the conference, so I went to see him instead, but all those of that, so 44 of them I've been to, I have seen a, and by the way, what I'm going to say right now, I tell people this all the time."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Conference", "Education", "Advocacy"], "q": "I have seen a dramatic improvement in the level of sophistication and programming that takes. Place at the conference over those years, early on when we were all fighting to achieve licensure and it was quite early in that effort and CEUS were emerging as something everybody needed, that was a real hit or miss event as to whether you education session was valuable too or not. That's not true anymore. Landscape architecture has turned outward to address the issues of the world like climate inequity, etc \u2014 and you can learn a heck of a lot about how other professionals are attacking those issues, all the way across North America, at least at the conference, and I learned something from every single session that I go to."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["Conference", "Networking"], "q": "Of course, that wasn't true 40 years ago, so yeah, it's a very solid opportunity, and of course the Expo is great and the networking is a big part of it."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["General"], "q": "W there's also the reality that because I'm licensed in Florida and New York, which are the two most pain in the *** states."}, {"p": "Mark Johnson", "m": "Member", "c": "Florida", "t": ["General"], "q": "If you're a young person and you haven't thought about ASLA, you should wake up and do it. It's a pathway to your success."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Volunteering", "Membership Value"], "q": "Good morning. Hi, my name is Matthew Adams and I'm a member of the Idaho, Montana chapter of ASLA and I am in Idaho and working in Eagle, Idaho."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education", "Advocacy", "Membership Value"], "q": "I've been a member of ASLA for 27 years. Two of those years were as a student member at Utah State University and then 25 as a professional."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Membership Value", "Education", "Networking"], "q": "One reason I continued my membership after graduation was that my employer paid for it, so it made it, that was enticing and I guess I all having the student experience and having that little built-in community, and people to meet with and learn from I just felt like that same kind of environment would continue forward and I was excited about that."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Membership Value"], "q": "I'd say that so the benefits shifted a bit, but mostly it was, I think it was me, so in school there's a lot of people around you that are doing things to support and like create an environment where you can be successful in the workplace. I think the responsibility shifts to you as an individual to engage, and I don't think I truly understood that, so my engagement dropped off a bit when I first joined as a professional, but the organization was still great. It was the Sierra chapter in Northern California, and they did great things, but my commitment engagement was just as a member that was contributing financially, I'd say, in those early years."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Membership Value"], "q": "My gosh, the value is it's hard to like pinpoint for me and I'm I get really excited about being an ASLA member and I'm really proud of it. I think I choose to continue to be a member, renew and be engaged for the community like I just. I feel like so now I tell people I'm in the third act of my career, so early career trying to learn things, mid career project management and a lot of design and now as I enter into the third act and what keeps me coming back now. Is this idea of community and connection and relationship? So ASLA gives me an opportunity to serve people that are in their first and second act."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Education"], "q": "I think of landscape architecture, but really just creates amazing moments and opportunities where I meet people or I learn what other landscape. Architects are doing and there's a lot of support within the organization to help me create those relationships and be successful there."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Volunteering", "Career Development"], "q": "In my local chapter, I am the Idaho Vice President and I'm the chairperson of the Professional Development Committee and in that role, so as Idaho VP, I'm really in an advocacy role. For all landscape projects in Idaho, so we're doing some work there that we can talk about if you'd like to and then professional development that's kind of that committee focuses on like our emerging professionals and what we do for them and I'm part of the I'm in the national, emerging Professionals Group, some connected with that, but we try to offer professional development for people in any phase of their career. We feel like that connection, mentoring or opportunity to learn, really applies to anybody."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Membership Value"], "q": "If you're 22 years old or if you're 70 and no matter how long you've been practicing, I think there's value to those opportunities."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Volunteering"], "q": "That geography is a challenge, so I think Idaho Montana's a big chapter based on a number of members, but we're in these like little pockets of areas, so like physically connected people makes us feel like we're in these small little groups, but I guess the challenges is geography and the ability to meet in person, right? That's like the first challenge, that geography also means that the market or the work culture can be greatly different depending on where you're working, so the different things that people are interested in, or want to focus on is widely varied and so it can be a challenge to like get the whole group focused and think that there's we're all talking the same language in Idaho, Montana. The Montana vice president was Megan Terry. Now it's going to be Zach."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Volunteering"], "q": "Technology certainly helps and we have a lot of good people in all those areas that are doing everything they can to engage and contribute and support each other."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking"], "q": "We just need to do what we can and I think savor the relationships that come from it and not get too worried or overwhelmed by measuring the outcomes."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Volunteering"], "q": "You're welcome, so Megan Terry is our president-elect and her and I, we talk a lot and we're talking about can we do less and try to do it better and can we just keep chipping away?"}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Career Development", "Networking"], "q": "32nd line pitch, I would say. What I've learned throughout my career is what's most important is the relationships that we have the opportunity to build over time, and that while a career can feel like there's a lot going on or that. Like you can feel overwhelmed at times or you really want to advance within your firm, your skill set, those kind of things. I would say become a member of ASLA, have the opportunity to go a little slower, meet a lot of people. Build those relationships and take a moment to really savor and appreciate those relationships, because after you're in the career 253035 years, that's what's meaningful. I have a hard time remembering all the projects I've worked on, or the specific things about them."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Career Development", "Sustainability & Climate"], "q": "I really remember the people that were involved, whether it was challenging or successful or a major failure or whatever it was It's about the people. ASLA gives you the platform, the environment to meet those people and build those relationships. Jobs."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "I have probably said it a dozen times, but I just, I believe in people. I love people. I think that. In life, engaging with learning from talking to people that we ASO is great because you go to a big event and most people are thinking similar to you, so you feel like, oh, this is so comfortable, but then you get to talk to people and there's a lot of different ideas and diversity of thought, and that is so healthy, and it's a crazy world right now, but maybe it's always been crazy, and what we need to do is just open up our minds to like, OK, I'm going to talk to people. I'm going to listen, and they'll learn from others, so I guess that's what I would add, and ASLA gives you the opportunity to do that, to experience that."}, {"p": "Matthew Adams", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "I can do that. Yeah, and Lydia, I would say that hopefully Idaho, Montana is kind of on the minds of everybody at Nationals because we are doing amazing things and I think we've decided we need to tell our story a little better, so we can be at a peer level with what are considered the larger markets, so thanks for doing this. This is great."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Membership Value"], "q": "Good. Yeah, looks like you have back-to-back of these, so thank you for doing this too. I think this is a really good opportunity for members to chat with ASLA. I think that's always a good thing, so."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Volunteering", "Membership Value"], "q": "You'll probably hear from I'm hoping we have at least three to four Idaho and Montana chapter members chat with you guys, so hopefully you hear more from our area. I am in Montana, so I am in southwest Montana."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["General"], "q": "I work for a multidisciplinary firm. Our firm focuses mainly on we started as a geoscience firm, so a lot of like hydrogeology, soils, reclamation. We were very Superfund focused, so I came on as a landscape architect, lots of reclamation, remediation and then, because we're small firms and small areas and there's so few of us, we kind of take on the hats of everything, so I do everything from like industrial master planning to commercial to every once in a while I go out and do residential, so it's kind of a all the things."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Education"], "q": "Yep, I have been a member of ASLA for probably over 10 years, however not consecutively. I started out at University of Idaho and I was on the student chapter of ASLA while I was there and then when I was a professional. It's actually kind of interesting. It's one of the things that I'd like for our chapter to work more with national. We have a lot of times where since we have a lot of smaller firms, we have very big disconnects in our continuity having members be continuously at ASLA because there's good years and there's bad years and we have a lot of members that. It'll only show that they've been ASLA members for one to two years, when in reality some of them have been members for 15 to 20, but that's not consecutive."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Membership Value"], "q": "It's really hard in our area to get consecutive membership, but we almost always have members come back eventually."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Education"], "q": "I would say at the time that I was going to school, our University of Idaho is very connected with ASLA and we were doing a lot of work with the national chapter to try to get. We had just started up a student chapter. We're very passionate about it and we had a very big group of us at that time too, so we had a studio of 30 students, which was it, which is big for that school and we had a lot of connection with University, Washington State University."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["General"], "q": "I would just say it was kind of the trendy thing to do when you were in The school and then as I've been a professional, the reason I keep coming back to ASL and I think a lot of us end up when we can't pay for it, we don't come, but we keep coming back because we are in an environment where we are so. Spread out and like I said, we have to wear every single hat out there that there's certain resources that are really nice for us to be able to tap into to get some of the background that we need when we don't like we can't be a niche firms here. We just don't have the ability to."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Career Development", "Membership Value"], "q": "I think that's part of the reason a lot of us in rural areas end up coming back. Is that there's you have a little bit more backing on a lot of things and it gives your name a little bit more substantiation when you're trying to be competitive against really big firms, so."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Membership Value"], "q": "ASLA membership matters to me because it's a way for us to connect with a broader spectrum of landscape architects. Again, in our area, I can tell you with Pretty confident with a lot of confidence that we probably know every landscape architect that's practicing in Idaho and Montana. There's just not many of us, especially in Montana. I can count 10 on my hands that are probably. The most active and those are the ones that are in their chapter, and then there's also the ones that we that aren't in the chapter, but we still know them because we're running into them all the time, so because there's only a handful of maybe 50 of us in Idaho and Montana that are truly living in the state too. It's an easy way for us to like start looking at other places."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Networking"], "q": "We start being able to connect with larger areas, start looking and seeing what other people are doing, and I think that adds value for us, especially when, again, when we have to wear every single hat and basically learn how to do new things on every single project, we can start looking around and saying, OK, someone else has done this somewhere. Let's take those pieces and then see if we can fit it pull it back into like our climate and our culture, and that's been pretty important as well, 'cause again, someone's probably done it and there's probably a way we can like fit it back in and have conversations with them, so."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["General"], "q": "That was a very long winded answer, so the resources that I use the most, and actually the ones that I use the most that I will mention on here too, are the advocacy pages that ASLA has. I'm and partially because that's part of my focus on Excom is, ensuring that we don't have any goofy things with coming up in our state and then once we get our license questioned almost every single legislative round, and so we work pretty closely with nationals to say what do we need to do? And again, we don't have that clout to do it, but we can reach out to national and it's. Beautiful cause everyone there already like has done this like they know that they know the round and they're able to swoop in and help us out a lot."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["General"], "q": "The other ones that I use, there's a few tools on the website that I really like going to, especially like the calculators, anything along those lines that when I need to show a client, water savings costs or ecological benefit, things like that. Usually I can search it on the ASL website and even if we don't have it, I can get a direction to where to go on there. That's through ASLA is how I learned about site certification too, so I'm actually site certified. I use site certification for a lot of things cause they have some great case studies, so it's secondary to what ASLA does, but that's still how I formed that connection. I'd say those are the kind of the big ones."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["General"], "q": "In my experience, lapses occur financially because we are a smaller market here. We generally COVID's a perfect time to talk about we don't have when projects dry up, they dry up very quickly and we generally see large swings and like layoffs and. Things like that in our area, so it's really hard to like build and I think that's why you don't see landscape architects like in mass around here too is we just we go through swings and you have to recreate yourself constantly. The other thing that I think happens in our area too is we don't. Is we don't have a lot of funding pots. It's interesting. We rely on the federal government for quite a bit of our funding, especially on anything that's going to be like parks, trails, things like that."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["General"], "q": "Anytime you get these lean years, you end up seeing a lot of decreases in people even being employed and stuff because. We are a smaller state that I don't think we've quite realized how much we rely on the federal government, but when those funding pots go away, especially as landscape architects, we're usually the first thing cut on projects."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Membership Value"], "q": "I think ASLA could help at the national level. This is why I mentioned I advocacy quite a bit is I'll go on there and like so Land and Water Conservation Fund is currently one of the big discussion points. We know locally that was already being affected and on the table because that's one of the main ways, that we are able to fund rural parks and rural trails, so for us that's a very real impact, so ASLA like to push that out to members that maybe don't that maybe have never even used Land and Water Conservation Fund again. The 15 of us can fight here and we can do our best, but when we can put it out to a broader scale and suddenly there's thousands of us, it amplifies our voice to be able to have a little bit more backing. Cause that one in particular is an easy one."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["General"], "q": "We need that here to do what we do, even if someone in like Los Angeles or DC.Seattle doesn't need it. They can still help us."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["General"], "q": "I don't think so. I'm trying to think if there's any I My next big push is I'm going to be trying to find someone in ASLA. I've been working with a lot of tribal members lately and our tribes in Montana. I think there's a huge potential for landscape architects to step in and help them. However, the resources are so that's one that I would like to push on here in the next few years is making sure that we have our rural reservations heard because it was staggering going out to one recently and seeing how underserved they truly are, and we just don't have the resources to be able to help them here."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Networking"], "q": "Again, if there's any way to like amplify those type of voices in settings where there are not a lot of people to again, the 15 of us can rally behind it, but until we have thousands, we don't, we can't make a make a difference, so."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Networking"], "q": "Perfect. Thank you guys for doing this too. I really appreciate again having the ability to talk to real people and do this so."}, {"p": "Megan Terry", "m": "Member", "c": "Washington", "t": ["Membership Value"], "q": "Perfect, and then your e-mail, I believe the when it came through, it just came through as a member testimonial at ASLA.org. Is that the one you want you want me to e-mail back?"}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Membership Value"], "q": "I have been a member of ASLA. I can't tell you exactly, but somewhere around 20 years."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Education"], "q": "In New York State you have to have 4 years, believe it or not, of apprenticeship training before you can become licensed, and so I did that immediately after, at the end of my time period, and that's about the same time that I became involved in ASLA."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Volunteering", "Membership Value"], "q": "It grew on me, so at first I was nominally a member. I paid my dues, and I went to an event occasionally, and then I became more inclined to go to events, and then I got the proverbial tap on my shoulder to join the local chapters executive Committee, and I think it was at that point where I really understood the benefits to me, but as the profession at large."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Networking"], "q": "It's a community of like-minded people we have. We certainly have differences of opinion, but I think in general our goals are similar, and it was really great to get to know people in a way that wasn't competitive."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Career Development"], "q": "Most of the time. Our firms are competing against each other for work, and it's nice to step out of that and actually be able to celebrate the work that we all do."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Membership Value", "Career Development"], "q": "The membership benefit that is most supported. My career, I believe, is the one that's not the easiest to see for local members."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["General"], "q": "That's where, as a collective group. I believe we can be really effective, and I think the last few years I have been paying more attention because the stakes are higher. We really need to be doing things about."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Sustainability & Climate", "International"], "q": "What's happening in the world in terms of climate change and resiliency and carbon, and those things are not so easy to tackle at my little practice level, but collectively we can do great things."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Education", "Membership Value"], "q": "I'm gonna stop you right there. I'm not sure how to answer that question, because I was a student member."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Conference", "Education", "Networking"], "q": "I would encourage a landscape architecture student to join ASLA, because it's a way for young people to broaden their world. They get to meet professionals, they get to attend conferences. It's a way to really understand the breadth of our profession."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Education"], "q": "Metimes I think when once a student and in school, you get really focused on conceptual design."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Education"], "q": "In also a focus these days in education, on systems, thinking and ecological thinking, and that's all very important to what we do, but there's so much more. That's a part of our profession, and I think ASLA is a way to get exposed to that and help choose, maybe non-traditional career paths, and that's a career path I ultimately chose."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Education", "Advocacy"], "q": "I was trained as a classically, as a designer, and I went to Cornell University, and I had a great education, but as time went on I became more interested in policy and in helping."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["General"], "q": "Communities that are disadvantaged in some way in upstate New York that tends to be economically challenged."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Career Development", "International"], "q": "Get their get their world built, so I spend most of my time these days managing projects that are grant funded, and I prepare and administer grants, and then I work with design teams to actually do the design work. I don't do very much design work anymore."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Networking"], "q": "What I love about that is when one's doing site scale work, you are doing the right things as best you can for a site, but when you're working on these large scale, grant funded projects, you're helping an entire community."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Education"], "q": "It's become really satisfying, but those are things that I wouldn't necessarily have known from my bubble in an academic practice."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["General"], "q": "Before I do a formal answer, let's talk this through a little bit. I think the only thing it might have changed is."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Education", "Career Development"], "q": "I might have thought about opportunities differently, so when I graduated from Cornell, one of my professors tapped me on the shoulder, and before I'd even graduated I had a job, and I worked there for 8 years, and then I've stayed here, and."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Networking"], "q": "I think one of the things that's possible is that if I'd had a broader reach and new people elsewhere, I might have sought."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Career Development"], "q": "Work in a in a different location, in a bigger firm, and the opportunities that come along with that."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["General"], "q": "I work in landscape archaeology that I didn't talk about Norm. I don't need to, but that's my avocation where I don't earn a dime. In fact, it costs me money."}, {"p": "Michelle Palmer", "m": "Fellow (FASLA)", "c": "New York", "t": ["Volunteering", "Fellowship"], "q": "On the on the flip side I was put up by my chapter for fellow last year, and I think that the committee had a little difficult time understanding my."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Education", "Networking"], "q": "I have been a member of ASLA.Since.2016 well, actually, 20-14 when I started at Smith Group, I had a colleague who really inspired me to get plugged into the Michigan ASLA chapter like right away, and that was actually my first introduction to being a member of ASLA was not a student member, so I missed out on all of that experience, but I really had a great support and great mentoring system at Smith Group who really encouraged the importance of participating at a Local level with ASLA.And being a part of their XCOM.So that was one of my first roles and opportunities. I jumped in as a secretary for the Michigan ASLA chapter, and then I had the opportunity of participating with the Diversity Summit several years later, and so that was honestly my first start. Back in 2014."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Membership Value"], "q": "ASLA membership matters to me, because I think it's an evolving. Value to your life and to your profession. I think when I first started again, back when I was a emerging professional, it was more of just the awareness of the profession and the network and the amount of Projects and skills and expertise that was out there. You have that opportunity to learn that through ASLA like as a member."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Membership Value", "Networking", "Career Development"], "q": "Then once you start getting really plugged in, like becoming a volunteer and serving and getting to know people on a not only a professional level, but a personal level, understanding their paths into the profess, understanding your like mindedness, understanding ways that you can learn from them and grow with them and partner with them. I think that's where the value of being a member becomes really important, because you get to Be a part of a community that is in alignment with your personal life, right? You're not only learning from others about how they're supporting the health, safety, and welfare of the environment of people, but you're also trying to do that as well as an individual, and so I think always being around like minded people and growing in that way helped me. See the value as a member and then it has evolved into more of a leadership role. Now it's more about advocacy. Now it's more about really. Collectively coming together to support strategies, and visions for the future and thinking strategically, and so that also that has helped me grow as an individual too, so I think there's been moments levels within the membership where I've seen the value. Of the awareness getting to know people building that community and then being able to really serve on an advocacy level."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Education", "Career Development"], "q": "That's a really good question \u2014 again yeah, based off of the fact that I wasn't a student. I think I encourage students to participate because. Within your academic career, you're just trying to In many ways, you're trying to learn so much, right? You're trying to learn. You're trying to build your skills."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Networking", "Education"], "q": "You're trying to understand what is landscape architecture. It's so broad. It has so much great impact and then you're trying to find your voice as well within each course within. Each project and you can get it's sidetracked by just trying to move through the semester, trying to make money, trying to make ends meet, that you lose sight of the larger vision of why you participated in, or joined the program and wanted to get this degree and so. I encourage students to participate within ASLA so that they can grow their inspiration. Of how they wanna contribute once they get out of school. Also, to begin to build. Mentors within ASLA to just have conversations with professionals. To build also their larger network of student. Communities, not only within your cohort, but also there's so many different programs and universities that you can and students that you can connect with I also think too that ASLA.Is primed to support students. There's so much resources that are out there for students to tap in and be a part of \u2014 and yeah."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Networking"], "q": "I just think that the value of a student participating only just broadens the network, makes it more diverse. Allows for them to have a voice within the organization. An equal weight with professionals, and the fact that they're going to be growing into these emerging professionals into these role models and leaders, allowing them to see that, but to see the value of being mentored by and being given resources, and then see the impact of that within their careers, and then as a result of that, you give back, right. That's so much easier to give back when that you've been poured into, and that you've been supported and you want to do that and continue to do that within your career. It's."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Career Development", "Education", "Networking"], "q": "It's a continued cycle. This doesn't start when you land it at a firm or land within a job. It's a career life learning. Path and Journey that you have to get into. It's landscape architecture is not about having a job and trying to get that out of a student. It's a career. It's a lifelong learning opportunity. It's an moment to participate and be involved. You evolve. You can evolve in so many different ways as a leader, as a as A expert in a particular. Interest or field a collaborator, a partner? All of that really starts within the community of ASLA.So that's why I really encourage them to participate, to see they may not see it in their years of being a student, but they'll see it as they grow and evolve. Into being. A professional over the years."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Education", "Networking", "Membership Value"], "q": "Faculty should be involved and hold membership with an ASLA because in many ways we are the first contact for students. In understanding landscape architecture, and so if we're not involved in, if we're not tapped into the larger network of ASLA.Then we lose sight of, connecting bridge of practice and education and resources and community for the students, and because ASLA is really prime and set up for that, I think we have an opportunity to learn more about how. Students can benefit from the work of as from the resources within ASLA, but also. For faculty to have a voice within the organization, there's so much that faculty are doing."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Networking", "Membership Value"], "q": "That's just incredibly impressive from Research to collaborating and partnering on amazing grants to thinking of innovative ways to support the profession and if we're not also sharing our voice and sharing our work and acknowledging the impact that we're. We're growing and evolving as the world is growing and as the profession is evolving. If we're if we're not all talking together and connecting together, it could. There could be some missed opportunities, so I think the value and the voice of a faculty member is crucial. It's crucial. The voice of A we are professionals like we are professionals. We are educators."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Education", "Networking", "Membership Value"], "q": "The voice of a professional should just be the one that you hear as a student in a firm. Once you hit ASLA, it should be a collective voice of faculty as well, who are having different voices and different perspectives of teaching and different areas of research, and that can be an easy way for students to connect and collaborate on their thesis projects. Their capstone projects, their, it can also inspire students to become teachers to become educators, so there's so much that the value of the voice of a faculty member, being plugged in and connected into ASLA.That can just be beneficial for all."}, {"p": "Monique Bassey", "m": "Student Member", "c": "Michigan", "t": ["Conference"], "q": "I feel so bad after I saw your great presentation. I was just like, man, I'm I messed up."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Volunteering", "Networking", "Membership Value"], "q": "I am My name is Nick Wester, PLA. I've been an ASLA member since 2019. I'm the current president-elect for the Texas chapter and just have a huge passion for our communities that we work in and making each community a better place."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Education"], "q": "I currently work as a project manager and associate for Design Workshop here in Austin. Oh, I should have restated that."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Networking", "Sustainability & Climate"], "q": "I work with lots of engineers and architects, other environmental scientists and ecologists, and I think that collaborative spirit is so important to our field, and as we learn how to craft better communities, I think great ideas. The ideas come from large groups of people with a passion for what they do, and I think playing a role in that collaborative environment is so important to creating the best places for people."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Networking"], "q": "I think the network, I think it would be beneficial to join ASLA for anyone to join because the network that you gain from doing that we have a diverse network of again, not just like landscape architects and planners, but other types of professionals, and you get a great network of people to work with You build connections and it's people that you can work with in the future or even from a personal standpoint, and I think finding fellow people that have a passion for what you do in slightly different area, in slightly different ways. Grows you as a more well-rounded professional and person yourself."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "ASLA has supported my professional career through always being there, always being such a wonderful resource for anything that you need, whether it's getting licensed or it's just the day-to-day work of being a practicing professional. ASLA just has a wonderful amount of resources and a passionate staff and team on their end that really helped to make the process smooth and again just have so many great resources to pull from."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Networking"], "q": "I think, I think, I think the conference in terms of tangible benefits is such of a great event to bring type different types of people together. I think the whether it's the state conferences or the national conference, the amount of planning and a great execution that occurs during that conference. Conference is just inspirational and it's so great to see such a very well executed place where people can come together, hear about different perspectives and really come together as a profession from a from a connection standpoint is great as well."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Networking", "Career Development"], "q": "I chose to get involved from a volunteer perspective with ASLA because I think getting involved in your community is sort of the next level that you can really take in your career, we all do day-to-day work working and practicing and, not only can you get a lot of connections through volunteering locally, but you're giving back to a community that you're already a part of, and it's a great way to show leadership and to build your network in the community that you're working in, and it's just and you. Such great people as well. There's really lots of benefits from getting for getting involved."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Membership Value"], "q": "I think there's lots of benefits that you get from being an ASLA member, even like small benefits like such as getting newsletters about topics that are upcoming or that are emerging whether it's being reminded to get your CEU credits if you live in a state that you need to get those as I do. Very important to just be in the know, stay up to date about trends and things like that and then so many of the other tools and member benefits that are on the website as well, very useful."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Networking", "Membership Value"], "q": "In terms of what I get from ASLA versus the cost it's always something you have to consider when you join a new organization. I think the cost versus the benefits totally is worth it because you get such of you get so many rich resources on from a relationships and. Connection standpoint to actual physical or actual materials. It's so great and it's a cost also that a lot of employers tend to want to absorb helps to helps to make that more affordable but even standalone I think for what you get and for, you're not only getting great benefits, but you're also feeling really good about contributing to a non-profit organization that does so many great things around the country."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Education"], "q": "That's incredible. I think you bring up a really good point about that. Like landscape architecture is a lot more than what you learn in school. It's not just what's on the page or it's not just the technical aspects or the more art related aspects."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "It's really about as you get into practice, it's about meeting people. It's about learning about new trends and opportunities, yeah, so and ASLA really kind of embodies lines of architecture from a more holistic perspective where it's not, it's not only what you learn. That's so great that you're gonna speak at that conference. I that's awesome. Yeah, you did such a great job in the in the CPC meetings."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "That's awesome. Yeah, you do. You do, you have to be able to speak to things well, and do you have a marketing background, you said as well?"}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "That's awesome. I feel like, yeah, like online and PR side is something that's so important to any organization and the fact that you it doesn't matter if you are educated in that or if you just acquire it you had that and then you applied that to this."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Membership Value"], "q": "That's great, and I think like members being like feeling like they're heard, not just heard, but that they're involved, so actually the fact that you wanted to do this was good instinct because so many nonprofits struggle with the wire members paying the dues, or why are they joining and sometimes they don't feel recognized and this is like directly recognizing members and talking to them, so I think this in and of itself is a great thing to do to make people, yeah.even add more value."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "That's awesome. Yeah, of course. You need to join ASLA because landscape architects really do make a difference in the environment. I can think back, my first memory was actually at a playground with my parents. It was in a public space, and these public spaces that we design and are involved in are so much people, they're really the stage that people, that people play out their lives on and that's why what we do is so important, the designing the built environment and ASLA directly supports all those types of efforts to do that and helps you to be even more successful within that world and in that field."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["Advocacy", "Membership Value"], "q": "You absolutely. Have to join ASLA because you're supporting the profession, you're strengthening the profession, and you're actually going to get a ton of actual benefits yourself out of it as well."}, {"p": "Nick Wester", "m": "Fellow (FASLA)", "c": "Texas", "t": ["General"], "q": "I know. Yeah, I'm saying so. I should be careful what I say \u2014 probably it's a joke. Yeah."}, {"p": "Nicole Beard", "m": "Associate Member", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "I have been a member of ASLA for 2 years as an associate member, and additionally as 4 years as a student member. While I was still at University."}, {"p": "Nicole Beard", "m": "Associate Member", "c": "Unknown", "t": ["Education", "Volunteering", "Membership Value"], "q": "I joined when I first started in the Kansas State University landscape Architecture program, so I joined our student chapter in the fall of my second year of the program, and have been a member since then."}, {"p": "Nicole Beard", "m": "Associate Member", "c": "Unknown", "t": ["Education", "Volunteering"], "q": "Joining at Kansas State University was encouraged both by student involvement and as well as the professors who support the organization. There's a strong student chapter organization at K-state, and it's pretty normal for us all to join, because there's a lot of excitement and involvement that come from the student chapter at Kansas State."}, {"p": "Nicole Beard", "m": "Associate Member", "c": "Unknown", "t": ["Membership Value"], "q": "Membership matters to me because it's a way to bring our landscape architecture community together, regardless of where you went to school or where you work, or where you're located in the country. It's a way for us all to come together to support the profession, support, licensing, and continue the efforts of landscape architecture in the landscape architecture community, but also the greater community in."}, {"p": "Nicole Beard", "m": "Associate Member", "c": "Unknown", "t": ["Career Development", "Education", "Networking"], "q": "A Sla. Connects me with other leaders in the community for me to learn from them and continue to support the profession as a professional member, and that's really great for my both personal professional development, but also educationally within my own firm and learning more about the profession and best ways to perform landscape architecture, but also in a way of management and leadership, as well."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Networking", "Advocacy"], "q": "As I always like to say, I made my best friends at ASLA and I still keep making more friends, and I also feel that it's our responsibility to give it back to our profession, and it's a great way to be involved and give it back."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Networking", "Education"], "q": "I think personal goals is more of being able to know people network and really contribute in my own ways to give it back as I said, and I think professional goals in terms of education, obviously the conference being able to learn new things, keep up with the changing world of knowledge and really being able to collaborate with other firms and Members or member firms that allow us opportunities to work together in Many different places and make an impact."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Membership Value", "Advocacy", "Publications & Resources"], "q": "I wouldn't put it in any order, but protection of our licensure is critical for our practice, and I think that is one of the biggest things that ASLA does, and I wouldn't say that is the only thing ASLA does, but that is one of the Biggest things that is important to me and I think important to our Members, and then other aspects of aslar the membership benefits in terms of the resources available on the website being able to sort of grow or the benefits available to our chapters in order to keep all our Members up to date and you. Know help them in various aspects education. Is a big deal. Those are a few."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Networking"], "q": "Great weighted network. Learn about new things. Keep in touch with your friends and really I think being together with the with our Members, friends, colleagues, peers and learning from them and their experiences is a very powerful tool that's available to us, so that's why we should all be attending the conference."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Conference", "Networking", "Membership Value"], "q": "That is a hard question, but actually a great question. I think networking events locally and nationally is where I have personally met people, attending lecture series attending conference sessions, where you get the opportunity to go and talk to the experts after the talk or before the talk. Those are great ways to connect. I think the access to, for me, going into some universities and meeting people from the education field who are very accom accomplished, all of those are what I would consider great benefits of being an ASLA member and just the database of people that you are you. Know sort of exposed to and have access to or may have access to with permissions obviously."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Networking", "Conference", "Career Development"], "q": "I think often what has happened is I wouldn't say it was a direct relation through that, but. Had a great collaboration here in Baltimore with another famous New York firm, and we did a project together. I think often what happens is the people we have met at the conference and the experts who speak in these sessions when we are going after projects this is a world of collaboration where you need a lot of experts and different firms of different expertise to collaborate and get into some projects and we've reached out to because of the connections we have been able to reach out to firms to see if they will partner with us, so I think that's a that's a very good benefit and for me personally that's how I have been able to make that connection as opposed to cold calling someone, here is a reference point of Hey, we met at this. I heard you and you are an expert and here is our portfolio. We would like to compete."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Awards", "Career Development", "Membership Value"], "q": "We would like to submit a proposal for this project and we would love to partner with you, so those are some of the simple things that have happened to me, and I'm sure you will find other examples from other members."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Conference"], "q": "It memories I don't think I've I started attending the conferences and I keep saying conference because that is the largest gathering of landscape architects and. In the in every year, and I think I started attending the conference back in 2008 and I have not missed a conference until now and to me that has created so many different memories of being able to meet people being able to attend. Grade sessions. I think the way this the conference material has changed and what we offer in the in that in the educational sessions have changed. I just think that I've had that is my greatest memory, which is hasn't ended yet. It's continues to grow, so not nothing specific. I can't tell you exactly."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Advocacy"], "q": "I think it's our responsibility to support our profession because I'm going to go back to licensure, I think without being licensed it is, it will be impossible to practice especially now that you're licensed in all 50 states. To me that is my biggest pitch is in order to protect your licensure and to be able to practice as a landscape architect in whichever state you are, I think it is your moral responsibility to the support and become a member. I think that's how we. Keep our profession, intact and. Yeah, that's it. That's my pitch."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["General"], "q": "I might have, you might. I might have to answer this question again because my phone rang. I didn't. I don't if that got recorded."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Career Development"], "q": "One thing I can say because of my journey as a landscape architect. Who is not from originally not from here. As somebody who has immigrated to this country? This. ASLA has provided me through my leadership path or my engagement with ASLA locally and nationally has provided me with a great resource in terms of personal development, personal leadership development, personal presentation skills, being able to be in front of large groups. Of people being able to build my confidence and then obviously all the other benefits that we talked about."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Networking"], "q": "To me it is a great way to build your skills in terms of public presentation, being able to speak in front of a crowd, being able to.Network with different people and I as a person who was very shy when I came here it has helped me open up immensely. To me, that is one of the greatest benefits of my engagement with ASLA."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["General"], "q": "They are balls of energy and very passionate like we are so lucky to have leaders like them. Michael Polano and Patrick Wilton. I'm going to pass it on to them."}, {"p": "Om Khurjekar", "m": "Member", "c": "Unknown", "t": ["Volunteering", "Membership Value"], "q": "Actually I might pass it on to our newest trustee and old, one of the most dedicated ASLA members of our chapter, Vernon Houston. To who is our current trustee? Yeah."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Education", "Membership Value"], "q": "I joined ASLA, when I was a senior in college. My program director encouraged us to become student members at the time."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Networking", "Membership Value"], "q": "A sla membership matters to me because it's such an incredible network of people, resources and opportunities that I really don't think I'd have access to any other way, not just in my State in Connecticut, but outside of the State as well. People that I've met all over the country, so it's a great resource to have and be a part of."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Education", "Networking", "Membership Value"], "q": "I would encourage a landscape architecture student to join ASLA, because there is such a wide network to get to know, and as a student. Sometimes you can become a little isolated. It was a really great opportunity for me to become a member when I was in college, because then I got to meet."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Volunteering", "Conference", "Networking"], "q": "The President at the time, the trustee at the time, and it exposed me to job opportunities, connections. Somebody in Pennsylvania that knew somebody in Connecticut that I was able to reach out to."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Education"], "q": "As well as just kind of helping bridge the gap between being a student graduating and then entering the workforce."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Membership Value"], "q": "I choose to renew my membership each year because I continue to find value in what ASLA offers, and I think it's really incredible to see how much ASLA listens to its membership and wants to hear what we think could be improved in order to provide more value to the members as well. I know that I'm renewing a membership that is meant for me, and is really there to help me grow and improve."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Membership Value", "Publications & Resources"], "q": "I would say, the resource provided with my membership that I use the most is the email newsletters that come out on a regular basis."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Publications & Resources"], "q": "I think it's kind of a 1-stop shop for keeping up with Grant and funding opportunities which we can use at work as well as offer to our clients for resources that they can pursue as well."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Publications & Resources"], "q": "I think it. It's a really helpful way to then funnel me to other resources that National or ASLA is offering, that I might not have been aware of@firstst."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["Networking", "Volunteering"], "q": "That's awesome. I was Gonna say, I'm the Connecticut chapter past President, so I am very honest and compassionate about the fact that I actually do think this is an important thing for people to be a part of So."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["General"], "q": "I'll change. I'll go change my hair and my clothes. Yeah, we'll keep rolling through it so."}, {"p": "Rachel Meier", "m": "Fellow (FASLA)", "c": "Connecticut", "t": ["General"], "q": "Hey, we have the same issue on the state level, so we gotta get gotta get info out somehow. So."}, {"p": "Randy Knowles", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Career Development"], "q": "Actually I came to the profession a very non traditional route. In high school, I didn't know what I wanted to do. They said go do something with numbers. You're good with numbers. You're creative, so I got a job as a in an accounting office, but it was the an office in a civil engineering firm, and then they recognized potential made me an engineering drafter over the first few years, and then they added a land planning and landscape architecture. Division, and hired a landscape architect and I worked under her for years, and then once I had my experience, I just needed a degree to go with it."}, {"p": "Randy Knowles", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Advocacy", "Career Development"], "q": "Late 30s, I went back and got a four year degree, but locally I could only get a degree in art, so I got a bachelors art in design and illustration. New Hampshire did not have licensure at the time, so I actually had to go to Maine to take the test."}, {"p": "Randy Knowles", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Volunteering", "Education", "Networking"], "q": "I sat for a portfolio review. They said OK, you can try the test and I took the test and. I passed so that year once I passed in 2002, I joined immediately. I didn't get involved. I was involved locally. We didn't have a separate chapter. We were part of Boston, and then I was asked to be on the board and quickly became chapter president look in 2015 and am now trustee, so it wasn't until I got involved on the national level that I actually found that I had found my people.'Cause not having gone through the traditional program of a five year school with studio and you develop friendships, I felt like I was isolated from that, but once I joined it was like OK.This is why I joined ASLA."}, {"p": "Randy Knowles", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education"], "q": "Even locally, they think I they say, what school did you go to? Notre Dame, but it was Notre Dame College, not Notre Dame University. Yeah, so."}, {"p": "Randy Knowles", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Advocacy", "Conference"], "q": "I would say it matters because they're constantly advocating for a profession and locally in New Hampshire were very small group of professionals and they've been able to help us defend our licensure three Times Now since we've only had licensure since 2006, but we've looked. To national we've had great help from Bradley and Elizabeth and, they've kept us on message. They've kept us, they've groomed us. To speak when I'm not a natural speaker, so we've had to go speak up in front of the House of Representatives, and the its absentative sessions, but we've been able to defend it for the last two years. No current threat, but there is the future, so we value the government division of ASLA as well."}, {"p": "Randy Knowles", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Membership Value"], "q": "Actually, I've had to do the elevator pitch to several ASLA members that have left their membership laps and then others that have questioned in our group."}, {"p": "Randy Knowles", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Membership Value"], "q": "The cost. The cost of the membership for ASLA.A lot of folks thinks that it's higher than it should be. I personally haven't seen an increase in the 20 something years. I've seen an increase obviously with cost of living, but no huge jumps and I think it's the benefits that it provides. Like advocacy at the federal level as a state, we might not get federal money back, but we know that. The national is fighting for funding for water quality for all of that."}, {"p": "Randy Knowles", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Advocacy", "Volunteering"], "q": "As a small state we really wouldn't have a contact with our senators and representatives that are in Washington, so it's a small price to pay for across the board lobbying and it also keeps us in touch with Every other state and through ASLA've met people that, come from unique locations in the in the nation and it sort of gets you to think about the profession again. It almost re energizes you, so it's a, it's A and it's a great way to get your CEUS.They've made it possible with a lot of the free seminars and stuff where locally it would be very difficult to find it because we are a small chapter and only cold, maybe two CEUS a year, so."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "I have been a member of Aceli for just about 20 years. I joined when I graduated."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Education", "Volunteering", "Membership Value"], "q": "After being a student member for many years in 2004, so I've been in a member of ASLA for about 20 years, and a member of a pretty active member of the local chapter since I got out of school."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "I became a member the first time in my journey as a landscape architect. As a student at Uw. Madison I participated."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Education", "Volunteering"], "q": "In the student chapter there and different activities, and I found it to be a great way to kind of meet folks in other classes."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Education", "Career Development", "Membership Value"], "q": "Throughout the program, and I continued my membership when I moved to Chicago and started my professional career here, so I was lucky to join a firm right out of right off the bat out of school that supported ASLA membership and paid for my ASLA membership, so it made it easy to transition from student member to professional member, and I have been with it."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Networking"], "q": "I think. 1, st first and foremost, it's the sense of community, so I think locally, it really provides us landscape architects with a format, to connect in person to see old friends a few times a year, to meet new folks with common interests, which is really valuable, especially in this day and age. I think that in person connection has been awesome."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Networking"], "q": "I'm also kind of in a unique position where I have worked in a lot of different corners of landscape architecture, so I've worked in private sector. I've worked in public sector for the Park district, and now I'm in campus planning at Northwestern, so nationally, it's been like a very valuable resource for me to connect with other professionals that are doing the same type of thing that I'm doing within landscape architecture, so it's been really cool. It makes it really easy to meet people and connect."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Advocacy", "Career Development"], "q": "Find out answers to questions. Find out how you can do your job better and just kind of engage, socially and professionally, so it's been really a valuable asset to me."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Membership Value", "Career Development"], "q": "The membership benefit that's most supported been most beneficial to my career. Certainly it's kind of changed, as my career has evolved early on It was really valuable to kind of connect with folks in other firms across the city, and understand kind of what the professional landscape looked like and what other, what kind of opportunities were available to landscape architects professionally."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["General"], "q": "Early on in my career, was also really valuable to me to connect with resources for studying, for and passing the LARE exam. It was really a priority for me to become licensed and resources available through ASLA, both nationally and locally, helped support me to do that which was great now, later in my career. It's really valuable to connect, like I said, with new folks that do similar things."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Networking"], "q": "That I do professionally and also keep in touch with old connections. That's, I think, critical. It's the sense of community that ASLA fosters, that I think is something really special and something I don't think that's super common to other professions, so we're small. A small profession, kind of a niche profession which can be a real benefit in terms of kind of that community."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Education", "Career Development"], "q": "W, at this point in my career, I'd say, online learning is really important to me. I keep up my license and keep up with the Ceu, so that's been really valuable at other points in my career."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Career Development", "Publications & Resources"], "q": "Joblink has been really awesome and amazing, both for finding new positions, and also soliciting positions for places where I work, so finding folks that might be great to work with, so I think those 2 resources right now are 2 that I would pull out as key for me."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Networking"], "q": "Ay. One other thing can I just add one more, one other key resource. The national conferences are really awesome, a great resource, and I think a really special thing that ASLA offers in terms of an opportunity to just kind of focus on the profession. Hear from folks that you maybe like and admire nationally, and reconnect with old friends."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Membership Value", "Volunteering"], "q": "Volunteering at the national level, for ASLA has made membership feel more valuable for me because I'm just more tuned in to what landscape architects are doing at the national level, and I'm more tuned into how."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["General"], "q": "The power that landscape architects kind of a small but mighty group have when we work together to advocate for different issues, so it's been a really eye opening experience in terms of the breadth of our advocacy, and what we're able and capable of doing when we work together to get things done, so I think it's felt very empowering."}, {"p": "Sarah White", "m": "Student Member", "c": "Unknown", "t": ["Advocacy"], "q": "For me as a professional to be involved at the national level, and to work with such a committed and focus group of professionals working together towards a common cause."}, {"p": "S  York", "t": ["Networking"], "q": "I think it matters to be a member, and I think anybody watching this or listening to this needs to know that I am a licensed landscape architect in New Jersey and New York, but in a way, I don't practice landscape architecture. I am I limit my practice to golf course architecture. I design golf courses, but I still feel it's important to be a member of the ASLA for one, getting education points. To go to meetings and maybe see some alumni and just to meet with peers because I work with engineering firms that have landscape architects, so I like meeting with peers, like discussing stuff."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "I hope I hope you when you put in the other. Entities amenities. Hopefully you did it, and you met, at least what are called the standards of care. The standards of the industry so that they were safe from a golf ball cause golfers hit golf balls all over the place and you. I did work, parlay that."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Networking"], "q": "How the ASLA has? Supported my professional career and personal. It's really more the I don't know how much the personal because both my first wife and my second wife have not been involved in any of it, never went to any meetings or anything, so it's more the professional thing and it's the networking. It's also the networking that you do, especially somebody like myself, who is a very limited thing in doing golf, that when I would go to, say the New Jersey, meeting and get my continued education points meeting people who are there. Oh, I'm."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Networking", "Career Development", "Membership Value"], "q": "I'm with this big engineering firm and we're putting a proposal in for a golf project. Do you want to be involved? So there's the networking that you do and it networking, marketing, whatever you want to call it, and I have met other
