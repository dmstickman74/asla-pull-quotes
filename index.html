, and she says, by the way, I don't care who you are People sometimes get stage fright. They could be the most seasoned actor in the world. Barbra Streisand got stage fright, by the way, after performing for 30 years. He says she says it's there to have some sugar and that sugar gives you a spark and it'll take away your stage fright. I've met a couple of people who were horrible speakers at conferences. One guy just stood there for when he first was introduced, he went up. He was totally dead \u2014 silence he grabbed the glass of water. He turned his back to the audience. He's drinking the water."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Conference"], "q": "I think this guy's going to walk off the stage, and it was somebody I knew and I had worked with I'd worked with this guy at a golf conference. He did terrible. I then told him what I just told you about the M&M's. I see him a year later, two years later, at the same conference."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Conference"], "q": "He's a speaker and I went over Ted. How you doing? And he shows me his bag of M and miss and he says this is the third time it absolutely works."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "It takes away may stage fright. I get up there and I just go, so anybody who has stage fright, some sugar right before you start talking."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Education", "Membership Value"], "q": "Going to ASLA meetings where I could take get continuing education points just to be very blunt. Since it's been required that you have continued education points, the states require it. Both in my case in New York and New Jersey, that's one of the benefits that they have a conference. The New Jersey Conference is one of the best. It's really very good. It's reasonably priced, and by the way, to the national, you probably gonna edit this out. I think you're too expensive, just to be honest, I think."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Networking"], "q": "I was ready to go to the Philly one. I'm 45 minutes from Philly, when Philly had it a few years ago, and then I looked at the price. I thought I'm not gonna do this, and then Syracuse said they had a free dinner thing, to meet alumni, so I went to the free dinner thing and I met some alumni."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Conference", "Education"], "q": "I said. I guess I don't need my continued education points that badly. It's basically the ASLA has helped in the fact that they run conferences, the regionals. The regionals do, and you could get your points and the Speaker's 9 out of 10 times are very good."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "I have not. I need to do that. I need to do that I need to do that and I have not."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "I need to do that now. Let me ask you a question then about that. Is it only available when it's live, or could you watch it when it's taped?"}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "I need I.I need I need. I need to do that 'cause. I think I'm gonna shoot a few points short of, and they do. It's like every two years you have to have so many points or whatever."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Career Development", "Networking"], "q": "It yeah, I the owner of the firm and I used to have employees. I don't have anymore. I have three people. One, it does have a master's in landscape architecture. They work out of their house, so they're what I call 1099 people. I pay them by the hour."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Networking"], "q": "They work for other people. They also work for themselves to our landscape art, and one is actually a licensed civil engineer who does work for me too."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Career Development", "Membership Value"], "q": "I don't know if being a member of the ASLA had any had any effect of whether I would have had my own firm or not. I'll be honest, I don't."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["Career Development"], "q": "I don't know that would have had anything if let me just say this, if the ASL exists, I would have still had my firm."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "I let me say this. I did. In fact, this is something you could check. They used to have in the 80s you used to have like for instance a suggested contract between."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "Owner and the contractor, not the owner in the landscape architect, but the owner and the contractor. There's four or five pages, and I would pay for it and get it and bottom footer at the bottom would say this was a publication number or XYZ? Whatever from the ASLA and I was out of them and we, my secretary at the time I had six employees back in the 90s called and said we need more. We stopped offering that we do not offer that anymore and I think they told my secretary there was some legal problem where between an owner and a contractor and both of them also sued the ASLA.That the contract was bad, so they stopped offering it and I wish they kept offering it."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "I actually took the contract I had. Client who is a lawyer, I said. Take this. Mark it up in red. I'm just gonna have my secretary type it in Word, and I'm gonna have this suggested contract. And he thought he only found a couple little very minor things. He changed, he says. I don't, he says. I wonder whatever happened with that lawsuit, I said. I don't know. I would, he says. I hope the judge kicked release the responsibility of the ASLA, he says, because this should have nothing to do with the contract, but anyway, so I did. I did use some of the paperwork that the ASLA offered in the in the 80s and in the early 90s, but that was, but that was before you were born."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "That's depressing, when I hear that somebody born in 2000 could even drink, how does that work?"}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "She's a little older than me. Whatever she's called. What is that? Is that Millennium."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "Most of my clients think I'm 10 years younger and I don't lie when they ask me how old I am I just say I'm old and I overhear them guessing what my age is, and I let them stick with those numbers. 'cause I'm older than they think I am, so."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "An ophthalmologist, which is an eye doctor or a pulmonologist, which is a lung doctor. It's same thing. I've met landscape architects that really specialized in doing playgrounds."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "W there's No title for that, but they limit that. Like, just like they're a building. Architects that only design houses of worship, but there's No title to that, but there is a title to doors architecture."}, {"p": "Stephen Kay", "m": "Member", "c": "New York", "t": ["General"], "q": "There you go. There you there you go. The state show is either end of January, early February every year in Atlantic City. That's where they have it."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Advocacy"], "q": "That makes perfect sense. OK, I won't pull a politician response, which is to answer something completely different than what the question is."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["General"], "q": "Mm. OK, well, I haven't prepared anything, so this just be an informal dialogue, I guess then."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Education", "Membership Value"], "q": "I've been a member of ASLA believe for 30 years now. I think I joined in 1995 as a student when I was earning my Bachelor of Landscape Architecture degree."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Education", "Publications & Resources"], "q": "I chose to join as a student in part because of my curiosity in the profession. I was I look back on it now. I was just a kid. I didn't know any different and it's fascinating to think about what. What we were going through in 1995, I think that was the same year I received my first e-mail address. I think I first. Internet had just come online and one of my professors at Ball State University. Mentioned ASLA to me and mentioned. This website called ASLA.org that I should go look at and I think it was from that point I was like this is the place that I can find more information about our profession. Until then, or prior to that, it was magazines and reports and books and word of mouth essentially, again, that was 1995."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Advocacy"], "q": "I was, I think I was 20 years old then or something like that. I was just, so young, I didn't know any different as far as what the profession could offer."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["General"], "q": "For sure, yeah. Katie Riddle and I both grew up in the same town. Daniel Martin and I also all three of us grew up in the same town, about like 2 miles from one another. I know it's just wild."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["General"], "q": "I saw it in the most recent LEM and I'm at a point in my career and I'm happy to talk about this more with one of your next questions just about I saw a turning point in my career maybe. I don't know, seven or eight years ago now maybe 10 years ago now that it was time for me to give more than take as it relates to the profession and I'm happy to go into that \u2014 philosophy now we're at a later question."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["General"], "q": "Great. Yeah, so I've been very fortunate to have had a career that has always challenged me, where opportunities were presented and therefore. Allowed me the platform to really take advantage of those opportunities and. Grow my career, grow the profession, or contribute to the profession, I should say, from my early days. After graduation, I moved to Australia and worked there and then found my way back to the United States, just before the September 11th attacks and landed in Colorado. Eventually worked in the Aspen office of Design Workshop and then moved to Austin to open up the office in Austin and in Houston, and I left that company and sold my ownership in 2017, but there was a pivotal moment, probably around 2014.That I had found myself. Let me back up for a moment."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Networking", "Fellowship"], "q": "I think a career is like a sponge or that's my analogy, and in the first half of your career, you're absorbing all this information, all these experiences, all these opportunities, connecting close to your mentors. Reading, researching, traveling, just taking it all in, but for me and my journey, probably around 2014, I guess it was, I felt that. Actually, it was 2015. Now that I say that I felt that my sponge had filled up, that was the same year that I was inducted into the Council of Fellows, and I was only 40 years old when that happened."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Volunteering"], "q": "It was just one of those eye-opening moments that. I've been so blessed to have all these amazing opportunities and take advantage of those opportunities and really curate my career around it, that it was time for me to wring out the sponge, I guess you could say, so I'm still a sponge. It's just the first half of my career I was absorbing, and now, the second-half of my career, I'm wringing that out and just trying to help others and give back. That's when I first started to get involved with ASLA National. I was on the LAM editorial board, and then, interestingly enough, when Katie joined ASLA think in 2017, I joined the Education Advisory Council and spent. I think 4 years on that council or on that committee, I should say."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Sustainability & Climate"], "q": "I keep on that council Education Advisory Committee spent four years, serving in that role in 2015 and 2016 and 2017, I was the lead designer for the ASLA Green Streets project that was it never saw through fruition and there's a lot of reasons why and. It's tough to build work in Washington DC as you can imagine, and there was also about the same time that there was a started be, just changing the political environment, if you can recall in 2016 in Washington DC, and so the idea of green streets I think just never fully got going, but so I was spending a lot of time at the center there in Washington DC cause that's where we had all of our meetings, so it's getting more and more exposed to just everyone."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Education", "Networking", "Volunteering"], "q": "I'm spending more time with Kurt and learning more about what his role was at ASLA and certainly with Jennifer and Brad McGee when he was with LAM and, then Katie came on board and just reconnected with her after so many years as friends, and so I joined the Education Advisory Committee and then. For four years, I think my time was 2021 to 2024. I think that's right. I worked closely with Carolyn Mitchell on the awards committee and that was a very enjoyable environment, but right now I'm not involved at any national committee level organization within ASLA, but much of my time is most recently has been spent on WXLA."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["General"], "q": "I'm a co-founder of WXLA.So I've been spending time helping to get that advanced and now we're starting to see sort of the next generation of interest playing more of a significant role in that organization, although it's not part of ASLA, it's certainly. A nonprofit that supports gender equity and equality in our profession, so that's the space that I've been working in, most relevant to landscape architecture outside of my work, of course."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Membership Value", "Advocacy", "Sustainability & Climate"], "q": "Is that the is that the question? OK, well, ASLA membership matters to me on many different levels. I think in the more contemporary situation is that given the current political environment."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Sustainability & Climate"], "q": "Which translates into the social, cultural, community, economic and environmental landscape for which we work in and influence communities and ecologies in Our voice and our role is more relevant today than any time that I've seen in my 30 years as an ASLA member, and I can't stress that enough. Our profession has no business sitting on the sidelines and watching what is happening. We have to be a strong, unified voice because. Many of our community members. Are being compromised. Many of our ecological systems that we know are valuable to the sustainability of this earth are being compromised."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Advocacy", "Membership Value"], "q": "We know that economic equity is being compromised. We know that housing is being compromised. And. I think that. I think that a representative, a state representative here in Texas, James Talarico, says it best. We've entered a space where. Politically, it's not left verse right, it's top verse bottom, and our profession historically and within the DNA of our profession, especially. As it took off in the United States was about serving the greater good, and so I tend to follow James Tolerico's theory of being top versus bottom, not right versus left, because if we're helping the bottom move up, then we're helping the greater whole and membership in an organization like ASLA for me gives me a platform. To help influence a better outcome."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Advocacy", "Membership Value"], "q": "That to me is one of the most significant things that we are facing today. Historically it's been my membership has just helped me, and foster my career. As I go back to your original question in 1995, I went when I first joined ASLA. I didn't even know what ASLA was I knew what landscape architecture was Obviously I was studying. At Ball State for landscape architecture, so I had a general idea, at least I think it did, of what landscape architecture was, but I didn't know there was a professional organization. I didn't even know about licensure. I didn't know. I just didn't know."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Membership Value"], "q": "I was like I said, I was just a kid, and I feel like along my journey, my ASLA membership has helped me stay current, helped me to stay relevant, helped me to stay informed and educated on Trends and matters that are important to landscape architects, that landscape architects can make a meaningful difference and with that in mind, the thing that I love about our profession and I feel like. ASLA has done a very good job with is that. We're not a static profession. One of my mentors explained it to me, I think best, and he said the profession of landscape architecture is not an object. We're this amoeba, that just moves and shapes ourselves around issues and tackles them."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Membership Value"], "q": "Then we're so fluid and dynamic we can go over and tackle another issue and make the link between issue A to issue B and see how they co-exist in resolving and. An outcome and when I think about the arc of my 30 year career and how I've seen. My own experience, my profession and the society also evolve and work around issues and tackle issues, just like that amoeba analogy. Is why I continue to be a member today. It the organization, the society has not become complacent and therefore I haven't found value in it. There's always been value over the 30 years that I've been a member."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["General"], "q": "First of all, I've seen the magazine much like ASLA as a society evolve. I think. I think Bill Thompson might have been the editor when I first joined. Don't quote me on that, but I think that's right, it's just. Bob and Brad McGee and now Jennifer and I.I really applaud the magazine and the leadership that runs that magazine that they are not afraid to tackle and be vocal about relevant issues and not just placate to A certain style of landscape architecture or talk about just the biggest, most attractive, most expensive, most sexiest project out there."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Conference"], "q": "Because there are these. Crazy expensive projects that are happening right now and certainly they deserve their attention, but they also talk about the smaller, more relevant and probably more relevant in the context of like what's the average size of a firm and the Type of projects that most people in ASLA actually do, so they tackle a wide range of projects. I love that they tackle a wide range of issues and Jennifer came right to us at WXLA right after we had our in 2018 at the Philadelphia Conference we had a session on Women in the profession about gender justice and we thought at WXLA, we thought it was going to be a one and done conversation, just we plant the seed, hopefully something happens."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Publications & Resources"], "q": "Then shortly thereafter, Jennifer reaches out and says. I want to do a feature article on this. People need to know about what's happening with gender equality or inequality really in our profession and. She was rolling up the sleeve, so the comment about Landscape Architecture Magazine is that I appreciate Landscape Architecture Magazine because they create an educational platform for us to Stay knowledgeable to advance our education, to stay relevant on topics that stretch from all corners of our profession, from design to construction to social injustices to Educational platforms of what universities are doing or technology, and I just love that."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Publications & Resources", "Education"], "q": "I find Landscape Architecture Magazine to be that common ground where if I need to go find something or learn something about technology, I can get to it. If I need to find something about education or. Design I can get to it. If I need to learn something about construction detailing, I can get to it. It is it's kind of like a micro library within our profession and I really appreciate that I have that resource available to me when I need to go to it."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Career Development"], "q": "Good. Jennifer is amazing. I just think so highly of her and her work and the leadership that she brings to LAN."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Education", "Networking", "Membership Value"], "q": "I'm going to put it in today's context and that is we are the reason why I would or what I would say to a landscape architect on the street that is not a member of our profession or not a member of ASLA is very simple. You and I are blessed to be a part of an organization that influences so many facets of this world, from ecological systems to intervention of art and design to economics to housing and community. Development to connecting people back with nature and the outdoors to helping with educational systems and, because of that blessing. We have, we have the ability to stretch and reach and make it make positive change to our communities and ASLA is that national platform that we can reach and stretch and learn from one another. In many different ways."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Advocacy"], "q": "When you have concerns as an individual landscape architect about how are we responding to bills on in Congress or in Senate that could compromise the integrity of what we do or defund. The very things that are important to our profession. I know I have somebody in Washington, DC that's an advocate for me right now, living in Austin, TX, I don't have to worry about that."}, {"p": "Steven J Spears", "m": "Member", "c": "Texas", "t": ["Advocacy"], "q": "At the state legislature, I know that our state chapters are fighting. To ensure that we stay relevant, that we have our licensure intact and that we're not ever sunsetted and really promoting the importance of health, safety and welfare at a state legislative level, and so ASLA just gives us that platform to ensure that the world continues to know the importance of what landscape architects do to improve the quality of life and health, safety and welfare and the resiliency of ecological systems. That's important. If we don't have that voice, then we're all on our own, and I'm not sure, I'm not sure the profession of landscape architecture is as well known, as well respected and as relevant as it is today if we don't have ASLA and I know, that was way more than 30 seconds, Lydian."}, {"p": "Susan Jacobson", "m": "Fellow (FASLA)", "c": "Illinois", "t": ["Volunteering", "Education"], "q": "I joined ASLA right out of college and kind of jumped in with both feet to help volunteering in my local chapter."}, {"p": "Susan Jacobson", "m": "Fellow (FASLA)", "c": "Illinois", "t": ["Membership Value", "Networking", "Advocacy"], "q": "Aslaid membership matters to me because it's a way to meet people, to hone my skills as a landscape architect, meet new people, and really get back to the profession."}, {"p": "Susan Jacobson", "m": "Fellow (FASLA)", "c": "Illinois", "t": ["Networking"], "q": "Even though it's free Internet and pre long distance phone calls, so chances are we wouldn't have been connected anyway, but I won't say that sorry."}, {"p": "Susan Jacobson", "m": "Fellow (FASLA)", "c": "Illinois", "t": ["Volunteering"], "q": "Joining the American Society of Landscape Architects was one of the most pivotal decisions in my career. From my early days as serving as the Illinois Chapter Secretary and chapter newsletter editor to leading the organization as a national president, it has provided me with a platform to grow to Give back and to shape the profession that I love through ASLA."}, {"p": "Susan Jacobson", "m": "Fellow (FASLA)", "c": "Illinois", "t": ["Networking", "Career Development", "Volunteering"], "q": "I've built lifelong connections and friendships. I've honed my leadership skills and contributed to advancing the landscape architecture. At a local, national, and even global level, whether advocating for the profession, mentoring the next generation, working on several different committees that celebrate excellence in design, my involvement has been both personally and professionally very fulfilling. ASLA fosters a strong and supportive community that elevates the field of landscape architecture. It has given me the opportunity to serve to learn, and to leave lasting impact, I encourage. Every landscape architect, whether just starting out or well into their career, to engage with ASLA and the rewards are both tangible and intangible, and they are immeasurable. That's it."}, {"p": "Susan Jacobson", "m": "Fellow (FASLA)", "c": "Illinois", "t": ["General"], "q": "It didn't look too much like I was reading it. It's like I tried to memorize it, but I'm not good at that so."}, {"p": "Susan Jacobson", "m": "Fellow (FASLA)", "c": "Illinois", "t": ["Networking"], "q": "I would encourage all students to join ASLA because it's an unbelievable resource for you. It helps you realize the breadth of the profession. How many different opportunities there are out there? It helps you connect with professionals, even if they're in an area that you're not interested at the present time. It may be something that you're going to be interested in later in your career. We find that we're very close knit community and everybody knows somebody else who can help you advance your career, and your career goals to find where your perfect niche is in this profession."}, {"p": "Susan Jacobson", "m": "Fellow (FASLA)", "c": "Illinois", "t": ["Membership Value", "Networking"], "q": "The value in membership is really in connecting with people and giving back. The more you volunteer, the more you get out of this profession, the more the more you learn about what everyone else is doing. Learn about the different skills that they have and just it helps you connect with everything in a profession, so it's typical. The more you give, the more you get."}, {"p": "Tiara Rachman", "m": "Student Member", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "I have been a member of ASLA for four years when I first joined the Landscape Architecture program at University of Maryland."}, {"p": "Tiara Rachman", "m": "Student Member", "c": "Unknown", "t": ["Career Development"], "q": "I'll be, starting at Land Design, on like next month, but yes, I will do that. Sure. OK \u2014 yeah do you also want me to include like the firm's name and like when I start or like, OK, sounds good."}, {"p": "Tiara Rachman", "m": "Student Member", "c": "Unknown", "t": ["Education"], "q": "My name is TR Rahman. I'm a recently graduate from University of Maryland and I am starting at Land Design next."}, {"p": efinitely will 'cause it's free and I think first years it's like at a discounted rate, right?"}, {"p": "Tiara Rachman", "m": "Student Member", "c": "Unknown", "t": ["General"], "q": "My gosh, no, I think I'm all good. Is there anything on your end that you want me to, like, tidy up saying?"}, {"p": "Tiara Rachman", "m": "Student Member", "c": "Unknown", "t": ["Education"], "q": "Personal. Yeah. OK, so I ASLA has definitely helped me grow professionally and personally, I would say professionally. It has helped me expand my understanding of the landscape architecture industry and really broadening the range. Of the possibilities for landscape architects, as far as personally, it has definitely allowed me to become a social butterfly and network, and that was something that I always thought was very difficult to do going into college, but. With all of the events and the resources and just how much students are involved, it makes it feel like a something that's very easy and fun and not intimidating to say the least."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Membership Value"], "q": "Pretty good. I think you're one of the few people that still remember that. Unfortunately."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Membership Value"], "q": "As the Dj. At my Prom, where I put my prom theme color was iridescent, and I remember being so mad that's not a color."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "I think I joined sla very early on Actually, I was a student member while I was in school."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education", "Career Development", "Volunteering"], "q": "Then did a little bit of early shuffling in my career, and then landed in the St. Louis Chapter. I think, about 2 years after I graduated."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Membership Value", "Networking", "Advocacy"], "q": "ASLA membership matters to me. I think because of all of the things that you don't see on paper, being a part of ASLA has been kind of a through line in my career. It's been a way for me to get connected locally to other professionals."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking"], "q": "In my area, and that was really important to me, especially as I moved from the Midwest to the Pacific Northwest, and finding new people, but also, I think, at a national level when I started getting involved."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Volunteering", "Networking", "Advocacy"], "q": "Kind of with the Chapter Presidents Council and beyond just getting connected to other professionals that I could kind of."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Career Development"], "q": "Help to help to see where my career could go, and also just make friends. To be honest. I've made some of the best friends of my life through ASLA. People that I travel with kind of outside of the realm of landscape architecture."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "The impact that I've seen kind of being within the organization. I wish everyone could see."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "All the good that we're doing behind the scenes that maybe you don't see. Kind of reflected."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Advocacy"], "q": "Reflected kind of in an obvious way, whether it be the legislation work that we're doing."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education", "Publications & Resources"], "q": "Or the public outreach work that we're doing or stem research things like that kind of the bettering of."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Advocacy"], "q": "Our profession as a whole, that maybe isn't quite as obvious. I wish more people understood the good that this organization is doing."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Publications & Resources", "Membership Value"], "q": "There's so much that's happening. Obviously, I think people see the magazine that in and in and of itself is a great value, but I think again it gets back to those kind of intangible."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Advocacy"], "q": "Put helping to introduce legislation at a national and State level. It's helping to get the word out there. To."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Career Development"], "q": "Defend what we do, and help to partner with other Allied organizations, there's so many intangible things that ASLA is doing and kind of fighting at a grassroots level all the way up to national levels that I think people just don't understand, so I never hesitate to."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking"], "q": "I just. I wish more people knew that. I wish people could see what the hard work that our staff."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Conference", "Networking"], "q": "I think again, I can't harp enough on kind of just the community of it all, not even just at the conference."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking"], "q": "I think more and more I'm seeing ASLA reflect who I am, and I'm getting to see other people that."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking", "Career Development"], "q": "Kona and these kind of professionals that are at very high levels in their career that I'm can now consider a friend. People that are other people that have mentored me in different ways. I think. I think ASLA has kind of become such a huge part of my career. It's helped me get 2 out of the 3 jobs I've had in my career been through connections with ASLA, so it's."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Career Development"], "q": "I can't really speak highly enough on the impact it's had on my career as a landscape architect. So."}, {"p": "Tim Slazinik", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking"], "q": "Anything else. Let me know. I've been trying to bug other people, too, because I don't. I'm kind of annoyed that your list isn't completely full."}, {"p": "Tom Balsley", "m": "Member", "c": "New York", "t": ["Membership Value"], "q": "Do you want me to restate? That's that again. For your purposes, I've been a member of ASLA for 50 years."}, {"p": "Tom Balsley", "m": "Member", "c": "New York", "t": ["Networking"], "q": "I was very poor, and so I it was a struggle for me to just get through school, so when I landed in New York, all I could think about was paying the rent and putting food on the table and finding clients, and I kind of convinced myself that. ASLA was not the place I was gonna find my clients, so it wasn't. It just simply wasn't the focus, and it wasn't until I started picking up a little bit of momentum, that so by about 1975, as we found out then I said what, I got to look around and say, no, I want to connect with my colleagues. I'm here as a sole practitioner. I really need partners and colleagues to help me. Move along with this journey, and I began to see ASLA through a different light rather than, just writing the check. I really saw it as partners."}, {"p": "Tom Balsley", "m": "Member", "c": "New York", "t": ["General"], "q": "It matters because the profession matters to me. Profession has been something I've dedicated my entire life to Us to always starting all the way in the beginning, where I was convinced that when I was going to school I wasn't going to be a golf course landscape architect, that I was going to go into the cities and save the city and make the cities livable and. That's what I've that's the route I've been on ever since, and ASLA has been my partner along that journey. I think to a certain extent. I still carry a little disappointment in the profession and in ASLA and not being able to come up with a An effective way to reach out to the inner city youth. Who are those who are missing from our profession? And we've got to find a way to connect with them."}, {"p": "Tom Balsley", "m": "Member", "c": "New York", "t": ["Networking"], "q": "Again, I mentioned that I started out as a sole practitioner and I was a sole practitioner right up until about 7:00 or eight years ago when I joined with SWA as SWA Balsley, so all of those years you can have senior people working with you. You can have people that you're treating as your partners, but ultimately. You need people beyond the walls of your office. You need those colleagues. You need to build those relationships to grow as a professional. We learn from each other when we swim in each others pools and I really strongly believe in collaboration on all levels, and I also. Believe that if you're truly. Possessed by this possession, this profession as I am, that you're gonna be making friends for life, and that's I'm told that's a that's a key to a good life."}, {"p": "Tom Balsley", "m": "Member", "c": "New York", "t": ["General"], "q": "I think the profession is always. Professed to become more diverse and inclusive, and it's been a source of frustration for me, but I would say in the last four or five years, I can see a change. I can feel that change. I.I teach at Harvard and I look at my class. I can see that change. I can see the change in my own office and the resumes that come across the door. It's coming. It's been too slow, but it's coming and I'm very proud to have been part of it from the beginning and I'm very happy to be experiencing it at this stage of my career because it's really what I think our profession needs to be. Able to address all of the issues of resiliency and climate change, which includes social and cultural."}, {"p": "Tom Balsley", "m": "Member", "c": "New York", "t": ["Volunteering", "Conference"], "q": "I'm. I'm just happy to be on board with you in any little words I can offer. You can parse out of this. I'm happy to contribute that way and look forward to seeing you at the Convention I'm doing."}, {"p": "Tom Balsley", "m": "Member", "c": "New York", "t": ["Awards", "Career Development"], "q": "I'm chairing the jury, the design jury this year, which is, which is really tough on us because our firm has so many projects we want to submit."}, {"p": "Tom Balsley", "m": "Member", "c": "New York", "t": ["General"], "q": "We're on We're on hold right now, so it's a There's a lot of sacrifice that comes with that answer, yes."}, {"p": "Tom Balsley", "m": "Member", "c": "New York", "t": ["Advocacy"], "q": "It speaks to it speaks to my dedication to ASLA and my belief in the profession."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Membership Value"], "q": "I had a period where I let my membership lapse, so I'll just say a total of, yeah, OK."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education"], "q": ", I'm William Sullivan. I'm a fellow in the American Society of Landscape Architects. I'm Professor of Landscape Architecture at the University of Illinois and I also direct a campus wide program called the Smart Healthy Communities Initiative. I've been a member of ASLA for kind of a cumulative of 18 years, I think."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "My membership left because I was really under pressure as a young professor, an associate professor to generate science, and I was putting every ounce of my energy and effort in into that, and I came back because I realized that I was missing an opportunity to share the results of our scientific work on the incredible power that high-quality landscapes have to create measurable impact. For the public, and I wanted to connect with practitioners more to both hear my message and learn what was going on, have a deeper understanding of what was going on in practice so that I could refine some of the questions that I was asking in ways that met the needs of practitioners."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "I rejoined 11 or 12 years ago, so. Conferences, the advocacy newsletters, the climate impact work and the work that describes the health impact of landscape architects, which I've contributed a lot of the science to so, the other thing is that you think of, do you think across a professional career, lots and lots and lots of things change, and one aspect of a career in landscape architecture is that things are changing constantly and you're off and you're learning and you're learning and learning and one of the most."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking"], "q": "Most important constants in the face of all that change is the relationships that you build and the community that you build, and ASLA is a great vehicle for helping build those relationships and get us a larger sense of community, shared purpose and shared ideals."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education", "Awards"], "q": "When I when I first started out as a young professor, 30.5 1/2 years ago I had this grand vision that the science that we were going to conduct and that we were currently conducting would have really important design implications. We'd create our science would generate design guidelines that landscape architects could use in daily practice, and what I learned through watching the ASLA Design Award winners year after year after year is that there was absolutely no need for me to contribute to Design guidelines because the award winners, all of them were already creating landscapes that produce valuable public impact right from the start."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking"], "q": "Then I then I had a little bit of a crisis like. Oh goodness, what good is all the science that we're generating that demonstrates the profoundly positive impacts to the public of high quality landscape architecture? And then I realized, oh, so many people go into situations in which they know in their bones that a that a high quality. Quality landscape would be beneficial, but without very carefully collected scientific information that's been vetted through this scientific peer-reviewed process. It's just kind of like what I know in my bones versus what you can afford to pay for, and people say, well I've got, I've just got. A limited budget and it's got to go towards schools or it's got to go towards more policing or it's got to go towards storm sewers."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "With this scientific evidence, you can say, well, if you want better schools, you better invest in the landscape because there's a clear and growing body of knowledge now, that demonstrates that the green infrastructure we install to help reduce flooding also has positive impacts on the capacity of children to pay attention, their grades in school, the their graduation rates and these their. Test scores on college entrance exams, so instead of focusing on storm sewers, maybe we could focus on green infrastructure that helps reduce flooding and that promotes these other Co benefits."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "I've had a number of, I've worked with Jared Green and there's been a number of articles about our work in land and that's been, that's been a really important piece, going to conferences and sharing the information has been an important piece, meeting practitioners and understanding the challenges that they're."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "Facing and trying to understand those challenges provides rich ideas for refining some of our studies to speak to those kinds of issues, especially with respect to funding because we've. We've grown past this notion that we're going to inform. Help designers create good designs. Excellent designers don't need our help there. Excellent designers need ammunition in their arsenal of arguments for why we should invest in high quality landscape architecture, why she why she we should pay for design and the outcomes of good design. Design in terms of high quality construction and that's helped me reshape my work."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["General"], "q": "I'd love to participate in it and I could bring very carefully vetted science to the table, not just a study here and there, but we've got, I've got over 130 published pieces of work that almost all of which speak to the value of landscape architecture, so I could I could bring deep expertise and clear specific pieces of evidence to the to that question."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Education"], "q": "It helps though. I guess just recycling one of the points I made earlier, which is things for practitioners today are just rapidly changing, and the stuff I learned when I was in design school is that's all old hat. We don't, we don't do any other. We don't, we don't treat water as a hazard \u2014 anymore we treat water as a resource, and when I went when I was in design school in the 80s, we thought, oh, you got to get rid of rainwater, get rid of it as quickly as possible, so it and now with generative AI, things are changing very rapidly again and with the pressure of climate. Change the pressure to come up with solutions is intense."}, {"p": "William Sullivan", "m": "Fellow (FASLA)", "c": "Unknown", "t": ["Networking"], "q": "The thing that hasn't changed is that all of us need a community of people with shared values and purpose, and ASLA is the most effective way to gather to gain that community and to sustain it over a long period of time, and it's a constant across people's careers. You have to have that community in order to thrive, I think, and ASLA is a great organization. For stimulating the development of that community."}, {"p": "Yiqing Wu", "m": "Associate Member", "c": "Unknown", "t": ["Education", "Membership Value"], "q": "I'm Ethan Wu and you can also call me Ethan. I work for field operations for seven years right now and I graduated from University of Pennsylvania MLA program and I have been ASLA member for three years since I guess registered landscape architect."}, {"p": "Yiqing Wu", "m": "Associate Member", "c": "Unknown", "t": ["Networking"], "q": "Because actually I'm working remote right now and I already I don't feel like really distant from the office. We have a lot of meetings every day, but we don't have a chance really to get good interact with other people. People or a deeper understanding of the society and the landscape, architecture, social circle, so that's why I was thinking I can maybe join ASL is also a very good chance to No other people to stay connected with other people, especially not only for the national level, but also for the state level, because we have a lot of events in the state level as well, so. That's why I joined this area."}, {"p": "Yiqing Wu", "m": "Associate Member", "c": "Unknown", "t": ["Networking", "Education", "Career Development"], "q": "I think, It's really about like know people and understand how they grow as well so I can learn from their story when we have some social events and. Understand how they grow from a junior into a senior or even into a leadership role of the company. That's those are really helpful and they also hold a lot of events let activeTopics = new Set();
let searchTimeout = null;

function getFilters() {
  return {
    search: document.getElementById('searchInput').value.toLowerCase().trim(),
    person: document.getElementById('personFilter').value,
    membership: document.getElementById('membershipFilter').value,
    chapter: document.getElementById('chapterFilter').value,
    topics: activeTopics,
  };
}

function matchesFilters(q, filters) {
  if (filters.person && q.p !== filters.person) return false;
  if (filters.membership && q.m !== filters.membership) return false;
  if (filters.chapter && q.c !== filters.chapter) return false;
  if (filters.topics.size > 0) {
    let hasMatch = false;
    for (const t of filters.topics) {
      if (q.t.includes(t)) { hasMatch = true; break; }
    }
    if (!hasMatch) return false;
  }
  if (filters.search) {
    const hay = (q.q + ' ' + q.p).toLowerCase();
    const words = filters.search.split(/\s+/);
    for (const w of words) {
      if (!hay.includes(w)) return false;
    }
  }
  return true;
}

function highlightText(text, search) {
  if (!search) return escapeHtml(text);
  const words = search.split(/\s+/).filter(w => w.length > 0);
  let result = escapeHtml(text);
  for (const w of words) {
    const re = new RegExp('(' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<mark style="background:#fff59d;padding:0 1px;border-radius:2px;">$1</mark>');
  }
  return result;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderQuotes() {
  const filters = getFilters();
  const filtered = QUOTES.filter(q => matchesFilters(q, filters));
  const grid = document.getElementById('quotesGrid');
  const countEl = document.getElementById('resultCount');

  countEl.innerHTML = `Showing <strong>${filtered.length}</strong> of <strong>${QUOTES.length}</strong> quotes`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>No quotes match your filters</h3><p>Try adjusting your search or filters</p></div>';
    return;
  }

  const show = filtered.slice(0, 200);
  grid.innerHTML = show.map((q, i) => `
    <div class="quote-card" id="card-${i}">
      <button class="copy-btn" onclick="copyQuote(${i}, event)">Copy</button>
      <div class="quote-meta">
        <span class="person-name">${escapeHtml(q.p)}</span>
        <span class="badge badge-membership">${escapeHtml(q.m)}</span>
        ${q.c !== 'Unknown' ? `<span class="badge badge-chapter">${escapeHtml(q.c)}</span>` : ''}
        ${q.t.map(t => `<span class="badge badge-topic">${escapeHtml(t)}</span>`).join('')}
      </div>
      <div class="quote-text">${highlightText(q.q, filters.search)}</div>
    </div>
  `).join('');

  if (filtered.length > 200) {
    grid.innerHTML += `<div class="empty-state"><p>Showing first 200 of ${filtered.length} results. Use filters to narrow down.</p></div>`;
  }
}

function copyQuote(idx, e) {
  e.stopPropagation();
  const filters = getFilters();
  const filtered = QUOTES.filter(q => matchesFilters(q, filters));
  const q = filtered[idx];
  const text = `"${q.q}" \u2014 ${q.p}, ${q.m}`;
  navigator.clipboard.writeText(text).then(() => {
    const card = document.getElementById('card-' + idx);
    const btn = card.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    card.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; card.classList.remove('copied'); }, 1500);
  });
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('personFilter').value = '';
  document.getElementById('membershipFilter').value = '';
  document.getElementById('chapterFilter').value = '';
  activeTopics.clear();
  document.querySelectorAll('.topic-chip').forEach(c => c.classList.remove('active'));
  renderQuotes();
}

function exportCSV() {
  const filters = getFilters();
  const filtered = QUOTES.filter(q => matchesFilters(q, filters));
  const rows = [['Person', 'Membership Type', 'Chapter', 'Topics', 'Quote']];
  for (const q of filtered) {
    rows.push([q.p, q.m, q.c, q.t.join('; '), q.q]);
  }
  const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'asla_pull_quotes.csv';
  a.click();
  URL.revokeObjectURL(url);
}

['personFilter', 'membershipFilter', 'chapterFilter'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderQuotes);
});
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(renderQuotes, 200);
});
document.querySelectorAll('.topic-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const topic = chip.dataset.topic;
    if (activeTopics.has(topic)) {
      activeTopics.delete(topic);
      chip.classList.remove('active');
    } else {
      activeTopics.add(topic);
      chip.classList.add('active');
    }
    renderQuotes();
  });
});

renderQuotes();
</script>
